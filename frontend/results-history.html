<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results History - MockExam Pro</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
<nav>
  <div class="container nav-container">
    <a href="dashboard.html" class="logo">MockExam Pro</a>
    <button onclick="window.location.href='dashboard.html'" class="btn" style="width:auto;padding:8px 15px;">
      Dashboard
    </button>
  </div>
</nav>

<main class="container" style="margin-top:40px;">
  <div class="card">
    <h2>📜 My Results History</h2>
    <p style="color:#64748b;margin-top:5px;">View all your previous mock test attempts.</p>
  </div>

  <div id="historyContainer" style="margin-top:25px;">
    Loading results...
  </div>
</main>

<script>
const API_BASE = "https://my-mock-test-platform.onrender.com/api";

document.addEventListener("DOMContentLoaded", async () => {
  const token = localStorage.getItem("mock_test_token");
  const userData = localStorage.getItem("mock_test_user");
  const container = document.getElementById("historyContainer");

  if (!token || !userData) {
    window.location.href = "login.html";
    return;
  }

  try {
    const response = await fetch(`${API_BASE}/tests/admin/results`);
    const results = await response.json();
    const user = JSON.parse(userData);

    const myResults = results.filter(r => r.userId?._id === user.id);

    if (myResults.length === 0) {
      container.innerHTML = `<div class="card">No results found.</div>`;
      return;
    }

    container.innerHTML = myResults.map((r, index) => `
      <div class="card" style="margin-bottom:15px;">
        <h3>Attempt #${index + 1}</h3>
        <p><strong>Score:</strong> ${r.score} / ${r.totalQuestions}</p>
        <p><strong>Percentage:</strong> ${r.percentage}%</p>
        <p><strong>Date:</strong> ${new Date(r.createdAt).toLocaleString()}</p>

        <button onclick="openReview('${r._id}')" class="btn" style="background:#1e293b;margin-top:10px;">
          Review Answers
        </button>
        <button onclick="downloadCertificate('${r.score}', '${r.totalQuestions}', '${r.percentage}', '${r.createdAt}')" class="btn" style="background:#16a34a;margin-top:10px;">
  Download Certificate
</button>
      </div>
    `).join("");

  } catch (err) {
    console.error(err);
    container.innerHTML = `<div class="card" style="color:red;">Failed to load results history.</div>`;
  }
});

function openReview(id) {
  localStorage.setItem("last_result_id", id);
  window.location.href = `review.html?id=${id}`;
}
function downloadCertificate(score, total, percentage, createdAt) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const userData = JSON.parse(localStorage.getItem("mock_test_user"));
  const username = userData?.username || "Student";
  const certificateId = "CERT-" + Date.now();

  doc.setFontSize(22);
  doc.text("MockExam Pro", 105, 30, { align: "center" });

  doc.setFontSize(18);
  doc.text("Certificate of Completion", 105, 50, { align: "center" });

  doc.setFontSize(12);
  doc.text("This certificate is proudly presented to", 105, 70, { align: "center" });

  doc.setFontSize(20);
  doc.text(username, 105, 90, { align: "center" });

  doc.setFontSize(12);
  doc.text(`For completing the mock test with score ${score}/${total}`, 105, 110, { align: "center" });
  doc.text(`Percentage: ${percentage}%`, 105, 122, { align: "center" });
  doc.text(`Exam Date: ${new Date(createdAt).toLocaleDateString()}`, 105, 134, { align: "center" });
  doc.text(`Certificate ID: ${certificateId}`, 105, 146, { align: "center" });

  doc.save("MockExam_Certificate.pdf");
}
</script>
</body>
</html>
