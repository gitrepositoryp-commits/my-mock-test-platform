<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Results History - RRB EDU</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<nav>
  <div class="container nav-container">
    <a href="dashboard.html" class="logo">RRB EDU</a>

    <button onclick="window.location.href='dashboard.html'"
      class="btn"
      style="width:auto;padding:8px 15px;">
      Dashboard
    </button>
  </div>
</nav>

<main class="container" style="margin-top:40px;">

  <div class="card">
    <h2>📜 My Results History</h2>
    <p style="color:#64748b;margin-top:5px;">
      View all your previous mock test attempts.
    </p>

    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;">
      <button class="btn" onclick="filterResults('ALL')">
        All
      </button>

      <button class="btn" onclick="filterResults('NTPC')">
        🚆 NTPC
      </button>

      <button class="btn" onclick="filterResults('GROUP_D')">
        🛤 Group-D
      </button>

      <button class="btn" onclick="filterResults('GROUP_2')">
        🏛 Group-2
      </button>
    </div>
  </div>

  <div id="historyContainer" style="margin-top:25px;">
    Loading results...
  </div>

</main>

<script>
const API_BASE = "https://my-mock-test-platform.onrender.com/api";

let allResults = [];

function getExamName(examType) {

  if (examType.startsWith("NTPC_FREE_")) {
    return `RRB NTPC Free Mock Test - ${examType.split("_").pop()}`;
  }

  if (examType.startsWith("NTPC_PREMIUM_")) {
    return `RRB NTPC Premium Mock Test - ${examType.split("_").pop()}`;
  }

  if (examType.startsWith("GROUP_D_FREE_")) {
    return `RRB Group-D Free Mock Test - ${examType.split("_").pop()}`;
  }

  if (examType.startsWith("GROUP_D_PREMIUM_")) {
    return `RRB Group-D Premium Mock Test - ${examType.split("_").pop()}`;
  }

  if (examType.startsWith("GROUP_2_FREE_")) {
    return `AP Group-2 Free Mock Test - ${examType.split("_").pop()}`;
  }

  if (examType.startsWith("GROUP_2_PREMIUM_")) {
    return `AP Group-2 Premium Mock Test - ${examType.split("_").pop()}`;
  }

  return examType;
}

document.addEventListener("DOMContentLoaded", async () => {
  const token =
  localStorage.getItem("mock_test_token") ||
  localStorage.getItem("token");
  const userData = localStorage.getItem("mock_test_user");
  const container = document.getElementById("historyContainer");

  if (!token || !userData) {
    window.location.href = "login.html";
    return;
  }

  try {
    const response = await fetch(`${API_BASE}/tests/my-results`, {
  headers: {
    Authorization: `Bearer ${token}`
  }
});
    const results = await response.json();
    if (response.status === 401) {
  alert("Session expired. Please login again.");
  localStorage.clear();
  window.location.href = "login.html";
  return;
}
    const user = JSON.parse(userData);

    if (!response.ok || !Array.isArray(results)) {
      container.innerHTML =
        `<div class="card" style="color:red;">
          Failed to load results history.
        </div>`;
      return;
    }

   allResults = results;

    renderResults(allResults);

  } catch (err) {
    console.error(err);
    container.innerHTML =
      `<div class="card" style="color:red;">
        Failed to load results history.
      </div>`;
  }
});

function renderResults(results) {
  const container = document.getElementById("historyContainer");

  if (!results || results.length === 0) {
    container.innerHTML =
      `<div class="card">No results found.</div>`;
    return;
  }

  container.innerHTML = results.map((r, index) => {
    const examType = r.examType || "NTPC";
    const examName = getExamName(examType);

    return `
      <div class="card" style="margin-bottom:15px;">

        <h3>Attempt #${index + 1}</h3>

        <p>
          <strong>Exam:</strong>
          ${examName}
        </p>

        <p>
          <strong>Score:</strong>
          ${r.score} / ${r.totalQuestions}
        </p>

        <p>
          <strong>Percentage:</strong>
          ${Number(r.percentage || 0).toFixed(2)}%
        </p>

        <p>
          <strong>Date:</strong>
          ${new Date(r.createdAt).toLocaleString()}
        </p>

        <button
          onclick="openReview('${r._id}', '${examType}')"
          class="btn"
          style="background:#1e293b;margin-top:10px;">
          Review Answers
        </button>

        <button
          onclick="downloadCertificate('${r.score}', '${r.totalQuestions}', '${r.percentage}', '${r.createdAt}', '${examType}')"
          class="btn"
          style="background:#16a34a;margin-top:10px;">
          Download Certificate
        </button>

      </div>
    `;
  }).join("");
}

function filterResults(type) {
  if (type === "ALL") {
    renderResults(allResults);
    return;
  }

const filtered = allResults.filter(
  r => r.examType && r.examType.startsWith(type)
);
  renderResults(filtered);
}

function openReview(id, examType) {
  localStorage.setItem("last_result_id", id);
  localStorage.setItem("last_exam_type", examType || "NTPC");

  window.location.href = `review.html?id=${id}`;
}

function downloadCertificate(score, total, percentage, createdAt, examType) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let username = "Student";

  try {
    const userData = JSON.parse(
      localStorage.getItem("mock_test_user")
    );

    username = userData?.username || "Student";
  } catch (e) {
    username = "Student";
  }

  const certificateId = "CERT-" + Date.now();
  const examName = getExamName(examType);

  doc.setFontSize(22);
  doc.text("RRB EDU", 105, 30, { align: "center" });

  doc.setFontSize(18);
  doc.text("Certificate of Completion", 105, 50, { align: "center" });

  doc.setFontSize(12);
  doc.text("This certificate is proudly presented to", 105, 70, { align: "center" });

  doc.setFontSize(20);
  doc.text(username, 105, 90, { align: "center" });

  doc.setFontSize(12);
  doc.text(`Exam: ${examName}`, 105, 106, { align: "center" });

  doc.text(
    `For completing the mock test with score ${score}/${total}`,
    105,
    120,
    { align: "center" }
  );

  doc.text(`Percentage: ${percentage}%`, 105, 132, { align: "center" });
  doc.text(`Exam Date: ${new Date(createdAt).toLocaleDateString()}`, 105, 144, { align: "center" });
  doc.text(`Certificate ID: ${certificateId}`, 105, 156, { align: "center" });

  doc.save("MockExam_Certificate.pdf");
}
</script>

</body>
</html>
