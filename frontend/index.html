<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Mock Test Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <div class="container nav-container">
      <a href="index.html" class="logo">MockExam Pro</a>
    </div>
  </nav>

  <main class="container auth-wrapper">
    <div class="auth-card">
      <h2>Get Started</h2>
      <p>Create a free student profile to begin practicing.</p>
      
      <form id="registerForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="e.g., alex_dev" required minlength="3">
        </div>
        
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Minimum 6 characters" required minlength="6">
        </div>
        
        <button type="submit" class="btn">Create Account</button>
      </form>
      
      <button onclick="window.location.href='login.html'" class="btn btn-secondary">Already have an account? Login</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
