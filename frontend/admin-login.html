<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - MockExam Pro</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  min-height:100vh;
  background:linear-gradient(135deg,#f8fbff,#eef2ff);
  overflow:hidden;
}

.bg-wave{
  position:fixed;
  right:-120px;
  bottom:-160px;
  width:850px;
  height:520px;
  background:linear-gradient(135deg,#60a5fa,#7c3aed);
  border-radius:55% 45% 0 0;
  opacity:.9;
  z-index:-1;
}

.brand{
  position:absolute;
  top:60px;
  left:70px;
  display:flex;
  gap:18px;
  align-items:center;
}

.logo-box{
  width:70px;
  height:70px;
  border-radius:22px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 15px 40px rgba(99,102,241,.2);
  font-size:32px;
}

.brand h2{
  color:#0f172a;
  font-size:28px;
}

.brand p{
  color:#7c3aed;
  margin-top:6px;
  font-size:18px;
}

.login-wrapper{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.login-card{
  width:430px;
  padding:42px;
  background:rgba(255,255,255,.9);
  border:1px solid rgba(255,255,255,.8);
  border-radius:26px;
  box-shadow:0 30px 80px rgba(15,23,42,.12);
  backdrop-filter:blur(12px);
  text-align:center;
}

.lock-icon{
  width:90px;
  height:90px;
  margin:0 auto 25px;
  border-radius:50%;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:40px;
  box-shadow:0 20px 40px rgba(99,102,241,.35);
}

.login-card h1{
  font-size:30px;
  color:#0f172a;
  margin-bottom:8px;
}

.login-card p{
  color:#64748b;
  margin-bottom:28px;
}

.input-group{
  margin-bottom:16px;
  text-align:left;
}

.input-group input{
  width:100%;
  padding:16px 18px;
  border:1px solid #dbe3f0;
  border-radius:12px;
  font-size:16px;
  outline:none;
  background:white;
}

.input-group input:focus{
  border-color:#7c3aed;
  box-shadow:0 0 0 4px rgba(124,58,237,.12);
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:14px;
  margin:8px 0 22px;
  color:#64748b;
}

.row a{
  color:#7c3aed;
  text-decoration:none;
}

.login-btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 14px 35px rgba(124,58,237,.3);
}

.login-btn:hover{
  transform:translateY(-1px);
}

.footer-text{
  margin-top:28px;
  font-size:14px;
  color:#94a3b8;
}

.secure-box{
  position:absolute;
  left:70px;
  bottom:80px;
  color:#0f172a;
}

.secure-icon{
  width:58px;
  height:58px;
  background:white;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  box-shadow:0 15px 35px rgba(15,23,42,.12);
  margin-bottom:18px;
}

.secure-box h3{
  font-size:22px;
  margin-bottom:10px;
}

.secure-box p{
  color:#64748b;
  line-height:1.6;
}

@media(max-width:768px){
  .brand,.secure-box{
    display:none;
  }

  .login-card{
    width:90%;
    padding:30px;
  }

  .bg-wave{
    width:600px;
    height:380px;
  }
}
</style>
</head>

<body>

<div class="bg-wave"></div>

<div class="brand">
  <div class="logo-box">🎓</div>
  <div>
    <h2>MockExam Pro</h2>
    <p>Admin Panel</p>
  </div>
</div>

<div class="secure-box">
  <div class="secure-icon">🛡️</div>
  <h3>Secure Admin Access</h3>
  <p>Only authorized administrators<br>can access this area.</p>
</div>

<div class="login-wrapper">
  <div class="login-card">

    <div class="lock-icon">🔒</div>

    <h1>Admin Login</h1>
    <p>Enter your credentials to access the admin panel</p>

    <div class="input-group">
      <input type="text" id="adminUsername" placeholder="Admin Username">
    </div>

    <div class="input-group">
      <input type="password" id="adminPassword" placeholder="Admin Password">
    </div>

    <div class="row">
      <label>
        <input type="checkbox" checked>
        Remember me
      </label>
      
    </div>
    <div style="text-align:right; margin-bottom:15px;">

         <a
    href="admin-forgot-password.html"
    style="
      color:#7c3aed;
      text-decoration:none;
      font-size:14px;
      font-weight:600;
    ">
    Forgot Password?
  </a>
</div>
    <button id="adminLoginBtn" class="login-btn">
      Login
    </button>

    <div class="footer-text">
      🔐 Secure Access • MockExam Pro Admin Panel
    </div>

  </div>
</div>

<script>
document.getElementById("adminLoginBtn").addEventListener("click", () => {
  const username = document.getElementById("adminUsername").value.trim();
  const password = document.getElementById("adminPassword").value.trim();

  if (username === "Prasanth" && password === "Koduru367@@") {
    localStorage.setItem("admin_logged_in", "true");
    window.location.href = "admin.html";
  } else {
    alert("Invalid Admin Credentials");
  }
});
</script>

</body>
</html>
