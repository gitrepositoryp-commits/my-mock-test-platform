<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | RRB EDU</title>
<link rel="icon" href="favicon.ico">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#f8fbff,#eef2ff);
  padding:20px;
}
.card{
  width:430px;
  background:white;
  border-radius:24px;
  padding:38px;
  box-shadow:0 30px 80px rgba(15,23,42,.12);
  text-align:center;
  margin:80px auto 40px;
}
.icon{width:85px;height:85px;margin:0 auto 22px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;color:white;font-size:38px}
h1{font-size:28px;color:#0f172a;margin-bottom:8px}
p{color:#64748b;margin-bottom:22px;line-height:1.5}
input{width:100%;padding:15px;border:1px solid #dbe3f0;border-radius:12px;font-size:16px;margin-bottom:12px;outline:none}
input:focus{border-color:#7c3aed;box-shadow:0 0 0 4px rgba(124,58,237,.12)}
button{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;font-size:17px;font-weight:bold;cursor:pointer;margin-top:6px}
button:disabled{opacity:.6;cursor:not-allowed}
.secondary{background:#16a34a}
a{display:block;margin-top:18px;color:#7c3aed;text-decoration:none;font-weight:bold}
.message{margin-top:14px;font-size:14px;font-weight:bold}
.success{color:#16a34a}
.error{color:#dc2626}
.hidden{display:none}
</style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-HRMVYHY980"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-HRMVYHY980');
</script>
</head>

<body>

<div class="card">
  <div class="icon">🔐</div>

  <h1>Forgot Password</h1>
  <p>Enter your registered email, get OTP, then reset your password.</p>

  <input type="email" id="email" placeholder="Registered Email">

  <button id="sendOtpBtn" onclick="sendOtp()">
    Send OTP
  </button>

  <div id="resetBox" class="hidden">
    <input type="text" id="otp" placeholder="Enter OTP">
    <input type="password" id="newPassword" placeholder="New Password">
    <input type="password" id="confirmPassword" placeholder="Confirm Password">

    <button class="secondary" onclick="resetPassword()">
      Reset Password
    </button>
  </div>

  <div id="message" class="message"></div>

  <a href="login.html">Back to Login</a>
</div>

<script>
const API_BASE = "https://my-mock-test-platform.onrender.com/api";

function showMessage(text, type) {
  const msg = document.getElementById("message");
  msg.textContent = text;
  msg.className = "message " + type;
}

async function sendOtp() {
  const email = document.getElementById("email").value.trim();
  const btn = document.getElementById("sendOtpBtn");

  if (!email) {
    showMessage("Please enter your registered email.", "error");
    return;
  }

  try {
    btn.disabled = true;
    btn.textContent = "Sending OTP...";

    const res = await fetch(`${API_BASE}/auth/forgot-password`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (res.ok) {
      showMessage(data.message || "OTP sent to your email.", "success");
      document.getElementById("resetBox").classList.remove("hidden");
      btn.textContent = "Resend OTP";
    } else {
      showMessage(data.error || "Failed to send OTP.", "error");
      btn.textContent = "Send OTP";
    }

  } catch (err) {
    console.error(err);
    showMessage("Network error. Try again.", "error");
    btn.textContent = "Send OTP";
  } finally {
    btn.disabled = false;
  }
}

async function resetPassword() {
  const email = document.getElementById("email").value.trim();
  const otp = document.getElementById("otp").value.trim();
  const newPassword = document.getElementById("newPassword").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();

  if (!email || !otp || !newPassword || !confirmPassword) {
    showMessage("Please fill email, OTP and password fields.", "error");
    return;
  }

  if (newPassword.length < 6) {
    showMessage("Password must be at least 6 characters.", "error");
    return;
  }

  if (newPassword !== confirmPassword) {
    showMessage("Passwords do not match.", "error");
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/auth/reset-password`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email,
        otp,
        newPassword
      })
    });

    const data = await res.json();

    if (res.ok) {
      alert(data.message || "Password reset successful.");
      window.location.href = "login.html";
    } else {
      showMessage(data.error || "Password reset failed.", "error");
    }

  } catch (err) {
    console.error(err);
    showMessage("Network error. Try again.", "error");
  }
}
</script>
