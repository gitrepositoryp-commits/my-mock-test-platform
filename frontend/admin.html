<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - PDF Bulk Question Uploader</title>
  <link rel="stylesheet" href="style.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>

  <nav>
    <div class="container nav-container">
      <a href="dashboard.html" class="logo">MockExam Pro (Admin Controls)</a>
      <button onclick="window.location.href='dashboard.html'" class="btn" style="width:auto; padding: 5px 15px;">Student Dashboard</button>
    </div>
  </nav>

  <main class="container auth-wrapper" style="min-height: 85vh; max-width: 800px; margin: 0 auto; display: block; padding-top: 30px;">
    
    <div class="card" style="padding: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
      <h2 style="text-align: center; margin-bottom: 5px;">Upload Question PDF</h2>
      <p style="text-align: center; color: #64748b; font-size: 14px; margin-bottom: 25px;">
        Easily extract and parse your General Awareness, Math, and Reasoning questions into the database cluster.
      </p>

      <div class="form-group" style="background: #f8fafc; border: 2px dashed var(--border-color); padding: 20px; border-radius: 8px; text-align: center;">
        <input type="file" id="pdfFileInput" accept=".pdf" style="font-size: 15px; cursor: pointer;">
      </div>

      <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px;">
        <button id="readPdfBtn" class="btn" style="background-color: #2563eb;">Read PDF</button>
        <button id="convertTextBtn" class="btn" style="background-color: #3b82f6;">Convert PDF Text to Questions</button>
      </div>

      <div class="form-group" style="margin-top: 25px;">
        <label for="pdfTextPreview" style="font-weight: bold; margin-bottom: 8px; display: block;">PDF Text Preview & Structural Logs</label>
        <textarea id="pdfTextPreview" style="width: 100%; height: 250px; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; font-family: monospace; font-size: 14px; resize: vertical; outline: none; background: #fafafa;" placeholder="PDF text will appear here..." readonly></textarea>
      </div>

      <button id="executeUploadBtn" class="btn" style="background-color: var(--success); margin-top: 15px; display: none;">
        Confirm & Push Questions to Cloud Atlas Database
      </button>
    </div>

  </main>

  <script>
    // Explicitly configure verified standalone worker paths
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const LIVE_BACKEND_URL = 'https://my-mock-test-platform.onrender.com/api';
    let extractedRawText = "";
    let formattedQuestionsPayload = [];

    // BUTTON ACTION 1: Parse PDF sheets in-memory
    document.getElementById('readPdfBtn').addEventListener('click', async () => {
      const fileInput = document.getElementById('pdfFileInput');
      const previewArea = document.getElementById('pdfTextPreview');
      
      if (fileInput.files.length === 0) {
        alert("Please select a valid quiz PDF file first.");
        return;
      }

      previewArea.value = "Reading document lines safely... Please wait.";
      const file = fileInput.files[0];
      const fileReader = new FileReader();

      fileReader.onload = async function() {
        try {
          const typedarray = new Uint8Array(this.result);
          const pdf = await pdfjsLib.getDocument({ data: typedarray }).promise;
          let fullTextContent = "";

          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textDoc = await page.getTextContent();
            const pageStrings = textDoc.items.map(item => item.str);
            fullTextContent += pageStrings.join(" ") + "\n";
          }

          extractedRawText = fullTextContent;
          previewArea.value = extractedRawText;
          alert(`Success! Read ${pdf.numPages} pages cleanly from file container.`);
        } catch (err) {
          console.error(err);
          previewArea.value = "Error parsing raw text vectors out of target data stream: " + err.message;
        }
      };

      fileReader.readAsArrayBuffer(file);
    });

    // BUTTON ACTION 2: Flexible extraction mapping loop
    document.getElementById('convertTextBtn').addEventListener('click', () => {
      const previewArea = document.getElementById('pdfTextPreview');
      if (!extractedRawText.trim()) {
        alert("Please run 'Read PDF' first to populate content variables.");
        return;
      }

      previewArea.value = "Parsing patterns into structured database rows...";

      // Standardize spacings across lines
      const cleanText = extractedRawText.replace(/[ \t]+/g, ' ');
      
      // Split blocks wherever a question index begins
      const questionBlocks = cleanText.split(/(?=\bQ?\d+[\.\:\)\s]+)/g);
      formattedQuestionsPayload = [];

      questionBlocks.forEach(block => {
        if (!block.trim() || block.length < 15) return;

        // Armored fallback search regex capturing questions, choices, and answer rows smoothly
        const qRegex = /(?:Q?\d+[\.\:\)\s]+)?(.+?)(?:\(?[A-a][\.\:\)\s]+|[^a-zA-Z]A\s+)(.+?)(?:\(?[B-b][\.\:\)\s]+|[^a-zA-Z]B\s+)(.+?)(?:\(?[C-c][\.\:\)\s]+|[^a-zA-Z]C\s+)(.+?)(?:\(?[D-d][\.\:\)\s]+|[^a-zA-Z]D\s+)(.+?)(?:Ans(?:wer)?[\.\:\s]*|Correct[\.\:\s]*|[^a-zA-Z]Ans\s*)([A-D,a-d])/i;
        const match = block.match(qRegex);

        if (match) {
          const qText = match[1].trim();
          const optA = match[2].trim();
          const optB = match[3].trim();
          const optC = match[4].trim();
          const optD = match[5].trim();
          const correctLetter = match[6].trim().toUpperCase();

          const optionsArray = [optA, optB, optC, optD];
          
          let correctString = optA;
          if (correctLetter === 'B') correctString = optB;
          if (correctLetter === 'C') correctString = optC;
          if (correctLetter === 'D') correctString = optD;

          formattedQuestionsPayload.push({
            question: qText,
            options: optionsArray,
            correctAnswer: correctString
          });
        }
      });

      if (formattedQuestionsPayload.length === 0) {
        previewArea.value = "Extraction complete but structural variations require direct check.\n\nRaw Text output displayed below:\n\n" + extractedRawText;
        alert("The visual text was read safely! However, ensure your option headings in the file read like 'A) Option text B) Option text' so the parser can bundle them automatically.");
      } else {
        previewArea.value = `Successfully structured ${formattedQuestionsPayload.length} exam items clean payload structure:\n\n` + JSON.stringify(formattedQuestionsPayload, null, 2);
        document.getElementById('executeUploadBtn').style.display = "block";
        alert(`Successfully found and structured ${formattedQuestionsPayload.length} questions matching layout parameters!`);
      }
    });

    // ACTION STEP 3: Submit batch over network channels
    document.getElementById('executeUploadBtn').addEventListener('click', async () => {
      if (formattedQuestionsPayload.length === 0) return;

      try {
        const response = await fetch(`${LIVE_BACKEND_URL}/tests/bulk-questions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ questionsArray: formattedQuestionsPayload })
        });
        const data = await response.json();

        if (response.ok) {
          alert(data.message || `Successfully committed ${formattedQuestionsPayload.length} questions straight into MongoDB Atlas!`);
          window.location.href = 'dashboard.html';
        } else {
          alert(data.error || "The cloud transaction was rejected by database handlers.");
        }
      } catch (err) {
        console.error(err);
        alert("Network processing fault tracking remote API pathways.");
      }
    });
  </script>
</body>
</html>
