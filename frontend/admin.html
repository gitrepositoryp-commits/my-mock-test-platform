<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - Bulk Uploader</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>

<body>

<nav>
  <div class="container nav-container">
    <a href="dashboard.html" class="logo">MockExam Pro Admin</a>
    <button id="adminLogoutBtn" class="btn" style="width:auto;padding:8px 15px;background:#dc2626;">
      Logout
    </button>
  </div>
</nav>

<main class="container auth-wrapper" style="min-height:85vh; max-width:950px; margin:0 auto; display:block; padding-top:30px;">

  <div class="card" style="padding:30px;">
    <h2 style="text-align:center;">Universal PDF Question Uploader</h2>

    <div style="margin:20px 0;">
      <label style="font-weight:bold;">Select Exam Type</label>
      <select id="examType" style="width:100%;padding:12px;margin-top:8px;border-radius:8px;">
        <option value="NTPC_FREE_1">RRB NTPC Free Mock 1</option>
        <option value="NTPC_FREE_2">RRB NTPC Free Mock 2</option>
        <option value="NTPC_FREE_3">RRB NTPC Free Mock 3</option>

        <option value="NTPC_PREMIUM_1">🔒 RRB NTPC Premium Mock 1</option>
        <option value="NTPC_PREMIUM_2">🔒 RRB NTPC Premium Mock 2</option>
        <option value="NTPC_PREMIUM_3">🔒 RRB NTPC Premium Mock 3</option>

        <option value="GROUP_D_FREE_1">RRB Group-D Free Mock 1</option>
        <option value="GROUP_D_FREE_2">RRB Group-D Free Mock 2</option>
        <option value="GROUP_D_FREE_3">RRB Group-D Free Mock 3</option>

        <option value="GROUP_D_PREMIUM_1">🔒 RRB Group-D Premium Mock 1</option>
        <option value="GROUP_D_PREMIUM_2">🔒 RRB Group-D Premium Mock 2</option>
        <option value="GROUP_D_PREMIUM_3">🔒 RRB Group-D Premium Mock 3</option>

        <option value="GROUP_2_FREE_1">AP Group-2 Free Mock 1</option>
        <option value="GROUP_2_FREE_2">AP Group-2 Free Mock 2</option>
        <option value="GROUP_2_FREE_3">AP Group-2 Free Mock 3</option>

        <option value="GROUP_2_PREMIUM_1">🔒 AP Group-2 Premium Mock 1</option>
        <option value="GROUP_2_PREMIUM_2">🔒 AP Group-2 Premium Mock 2</option>
        <option value="GROUP_2_PREMIUM_3">🔒 AP Group-2 Premium Mock 3</option>
      </select>
    </div>

    <div style="text-align:center; margin:15px 0; padding:15px; background:#f1f5f9; border-radius:8px;">
      <h3 id="questionCountDisplay" style="margin:0;color:#2563eb;">Total Questions: Loading...</h3>
    </div>

    <div class="card" style="margin-top:20px;padding:20px;">
      <h3>📈 Admin Analytics</h3>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-top:15px;">
        <div style="background:#eff6ff;padding:15px;border-radius:8px;text-align:center;">
          <h2 id="totalResultsCard">0</h2>
          <p>Total Results</p>
        </div>

        <div style="background:#ecfdf5;padding:15px;border-radius:8px;text-align:center;">
          <h2 id="highestScoreCard">0</h2>
          <p>Highest Score</p>
        </div>

        <div style="background:#fef3c7;padding:15px;border-radius:8px;text-align:center;">
          <h2 id="avgPercentageCard">0%</h2>
          <p>Average %</p>
        </div>

        <div style="background:#f3e8ff;padding:15px;border-radius:8px;text-align:center;">
          <h2 id="studentsCard">0</h2>
          <p>Students</p>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:20px;padding:20px;">
      <h3>📊 Student Results</h3>
      <button id="loadResultsBtn" class="btn" style="background:#7c3aed;margin-top:10px;">
        Load Results
      </button>
      <div id="resultsContainer" style="margin-top:20px;"></div>
    </div>

    <div class="card" style="margin-top:20px;padding:20px;">
      <h3>🔍 Search Questions</h3>

      <input
        type="text"
        id="searchQuestionInput"
        placeholder="Type any keyword..."
        style="width:100%;padding:10px;margin-top:10px;"
      >

      <div id="questionPreviewContainer" style="margin-top:20px;"></div>
    </div>

    <div class="form-group" style="background:#f8fafc;border:2px dashed #ddd;padding:20px;border-radius:8px;text-align:center;margin-top:20px;">
      <input type="file" id="pdfFileInput" accept=".pdf">
    </div>

    <div style="display:flex;gap:15px;margin-top:20px;flex-wrap:wrap;">
      <button id="readPdfBtn" class="btn" style="background:#2563eb;flex:1;">Step 1: Read PDF</button>
      <button id="smartParseBtn" class="btn" style="background:#0284c7;flex:1;">Step 2: Convert To JSON</button>
    </div>

    <textarea id="editorConsole" style="width:100%;height:420px;margin-top:25px;padding:12px;font-family:monospace;font-size:13px;"></textarea>

    <button id="deleteAllBtn" class="btn" style="background:#dc2626;margin-top:15px;font-size:16px;padding:14px;">
      🗑 Delete Selected Exam Questions
    </button>

    <button id="executeUploadBtn" class="btn" style="background:green;margin-top:15px;font-size:16px;padding:14px;">
      🚀 Upload Questions to Selected Exam
    </button>
  </div>

</main>

<script>
const LIVE_BACKEND_URL = "https://my-mock-test-platform.onrender.com/api";

function getAdminToken() {
  return localStorage.getItem("token") ||
         localStorage.getItem("adminToken") ||
         localStorage.getItem("authToken");
}

function adminHeaders() {
  const token = getAdminToken();

  return {
    "Content-Type": "application/json",
    "Authorization": `Bearer ${token}`
  };
}

if (localStorage.getItem("admin_logged_in") !== "true" || !getAdminToken()) {
  alert("Admin session expired. Please login again.");
  window.location.href = "admin-login.html";
}

const pdfjsLib = window["pdfjs-dist/build/pdf"];
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

let allQuestions = [];

function getSelectedExam() {
  return document.getElementById("examType").value;
}

function getExamLabel() {
  return getSelectedExam();
}

/* QUESTION COUNTER */
async function loadQuestionCount() {
  try {
    const exam = getSelectedExam();

    const response = await fetch(
      `${LIVE_BACKEND_URL}/tests/admin/questions?exam=${exam}`,
      { headers: adminHeaders() }
    );

    const data = await response.json();

    if (response.ok && Array.isArray(data)) {
      document.getElementById("questionCountDisplay").textContent =
        `${getExamLabel()} Questions: ${data.length}`;
    } else {
      document.getElementById("questionCountDisplay").textContent =
        data.error || "Total Questions: Unable to load";
    }

  } catch (err) {
    console.error("COUNT ERROR:", err);
    document.getElementById("questionCountDisplay").textContent =
      "Total Questions: Error";
  }
}

/* READ PDF */
document.getElementById("readPdfBtn").addEventListener("click", async () => {
  const fileInput = document.getElementById("pdfFileInput");
  const consoleArea = document.getElementById("editorConsole");

  if (fileInput.files.length === 0) {
    alert("Please choose PDF first.");
    return;
  }

  consoleArea.value = "Reading PDF... please wait.";

  const fileReader = new FileReader();

  fileReader.onload = async function () {
    try {
      const typedarray = new Uint8Array(this.result);
      const pdf = await pdfjsLib.getDocument({ data: typedarray }).promise;

      let fullText = "";

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        const pageText = textContent.items.map(item => item.str).join(" ");
        fullText += pageText + "\n";
      }

      consoleArea.value = fullText;
      alert("PDF loaded successfully. Now click Step 2.");

    } catch (err) {
      console.error(err);
      alert("PDF read error: " + err.message);
    }
  };

  fileReader.readAsArrayBuffer(fileInput.files[0]);
});

/* PARSER */
function parseQuestions(text) {
  text = text.replace(/\s+/g, " ").trim();

  let blocks = text.split(/(?=Q\.?\s*\d+)/gi);

  if (blocks.length <= 1) {
    blocks = text.split(/(?=\b\d+\s*[\.\)]\s+)/g);
  }

  const questions = [];
  const examType = getSelectedExam();

  blocks.forEach(block => {
    block = block.trim();
    if (block.length < 20) return;

    let questionText = "";
    let options = [];
    let correctAnswer = "";

    const qMatch = block.match(/Q\.?\s*\d+\.?\s*([\s\S]*?)(?=\s+(?:Ans|Answer|Correct Answer)\s+|\s+1[\.\)]\s+)/i);

    if (qMatch) {
      questionText = qMatch[1].trim();
    } else {
      questionText = block.replace(/^Q\.?\s*\d+\.?/i, "").trim();
    }

    const optionRegex = /(?:^|\s)([1-4])[\.\)]\s*(.*?)(?=\s+[1-4][\.\)]\s*|$)/g;
    let match;

    while ((match = optionRegex.exec(block)) !== null) {
      let opt = match[2].trim();

      opt = opt
        .replace(/(?:Ans|Answer|Correct Answer).*/i, "")
        .trim();

      if (opt.length > 0) {
        options.push(opt);
      }
    }

    const ansMatch = block.match(/(?:Ans|Answer|Correct Answer)[\s\:\.\-]*([1-4A-D])/i);

    if (ansMatch) {
      const ans = ansMatch[1].toUpperCase();

      if (ans === "1" || ans === "A") correctAnswer = options[0];
      if (ans === "2" || ans === "B") correctAnswer = options[1];
      if (ans === "3" || ans === "C") correctAnswer = options[2];
      if (ans === "4" || ans === "D") correctAnswer = options[3];
    }

    if (!correctAnswer) {
      correctAnswer = options[0];
    }

    if (questionText && options.length >= 4) {
      questions.push({
        examType,
        question: questionText,
        options: options.slice(0, 4),
        correctAnswer,
        category: "General"
      });
    }
  });

  return questions;
}

/* CONVERT */
document.getElementById("smartParseBtn").addEventListener("click", () => {
  const consoleArea = document.getElementById("editorConsole");
  const text = consoleArea.value.trim();

  if (!text) {
    alert("Please read PDF first.");
    return;
  }

  const parsed = parseQuestions(text);

  if (parsed.length === 0) {
    alert("No questions detected. Your PDF format is different.");
    return;
  }

  consoleArea.value = JSON.stringify(parsed, null, 2);
  alert(`Successfully converted ${parsed.length} ${getExamLabel()} questions.`);
});

/* BULK UPLOAD */
document.getElementById("executeUploadBtn").addEventListener("click", async () => {
  const consoleArea = document.getElementById("editorConsole");
  const examType = getSelectedExam();

  let questionsArray;

  try {
    questionsArray = JSON.parse(consoleArea.value.trim());
  } catch (err) {
    alert("JSON error. First click Step 2 Convert To JSON.");
    return;
  }

  if (!Array.isArray(questionsArray)) {
    alert("JSON must be an array.");
    return;
  }

  questionsArray = questionsArray.map(q => ({
    ...q,
    examType
  }));

  try {
    const response = await fetch(`${LIVE_BACKEND_URL}/tests/bulk-questions`, {
      method: "POST",
      headers: adminHeaders(),
      body: JSON.stringify({
        examType,
        questionsArray
      })
    });

    const data = await response.json();

    if (response.ok) {
      alert(data.message || `Successfully uploaded ${questionsArray.length} questions.`);
      await loadQuestionCount();
      await loadQuestionsPreview();
      await loadAdminAnalytics();
    } else {
      alert(data.error || "Upload failed.");
    }

  } catch (err) {
    console.error("UPLOAD ERROR:", err);
    alert("Upload error: " + err.message);
  }
});

/* DELETE SELECTED EXAM QUESTIONS */
document.getElementById("deleteAllBtn").addEventListener("click", async () => {
  const exam = getSelectedExam();

  const confirmDelete = confirm(
    `Are you sure? This will delete ALL ${getExamLabel()} questions only.`
  );

  if (!confirmDelete) return;

  try {
    const response = await fetch(
      `${LIVE_BACKEND_URL}/tests/questions/delete-all?exam=${exam}`,
      {
        method: "DELETE",
        headers: adminHeaders()
      }
    );

    const data = await response.json();

    if (response.ok) {
      alert(data.message);
      await loadQuestionCount();
      await loadQuestionsPreview();
    } else {
      alert(data.error || "Delete failed.");
    }

  } catch (err) {
    console.error("DELETE ERROR:", err);
    alert("Delete error: " + err.message);
  }
});

/* LOAD QUESTIONS PREVIEW */
async function loadQuestionsPreview() {
  try {
    const exam = getSelectedExam();

    const response = await fetch(
      `${LIVE_BACKEND_URL}/tests/admin/questions?exam=${exam}`,
      { headers: adminHeaders() }
    );

    const data = await response.json();

    if (!response.ok) {
      console.log(data);
      return;
    }

    allQuestions = data;
    renderQuestions(allQuestions.slice(0, 20));

  } catch (err) {
    console.error(err);
  }
}

/* RENDER QUESTIONS */
function renderQuestions(questions) {
  const container = document.getElementById("questionPreviewContainer");
  container.innerHTML = "";

  if (questions.length === 0) {
    container.innerHTML = `<p style="color:#64748b;">No questions found for ${getExamLabel()}.</p>`;
    return;
  }

  questions.forEach((q, index) => {
    const card = document.createElement("div");

    card.style.border = "1px solid #ddd";
    card.style.padding = "15px";
    card.style.marginBottom = "15px";
    card.style.borderRadius = "8px";

    card.innerHTML = `
      <h4>Q${index + 1} - ${q.examType || getSelectedExam()}</h4>

      <textarea id="qtext-${q._id}" style="width:100%;height:70px;">${q.question || ""}</textarea>

      <input id="opt1-${q._id}" value="${q.options?.[0] || ""}" style="width:100%;margin-top:8px;padding:8px;">
      <input id="opt2-${q._id}" value="${q.options?.[1] || ""}" style="width:100%;margin-top:8px;padding:8px;">
      <input id="opt3-${q._id}" value="${q.options?.[2] || ""}" style="width:100%;margin-top:8px;padding:8px;">
      <input id="opt4-${q._id}" value="${q.options?.[3] || ""}" style="width:100%;margin-top:8px;padding:8px;">

      <input id="ans-${q._id}" value="${q.correctAnswer || ""}" style="width:100%;margin-top:8px;padding:8px;color:green;font-weight:bold;">

      <button onclick="updateQuestion('${q._id}')" class="btn" style="background:#2563eb;margin-top:10px;">
        Save Question
      </button>

      <button onclick="deleteSingleQuestion('${q._id}')" class="btn" style="background:#dc2626;margin-top:10px;">
        Delete Question
      </button>
    `;

    container.appendChild(card);
  });
}

/* UPDATE QUESTION */
async function updateQuestion(id) {
  const examType = getSelectedExam();

  const question = document.getElementById(`qtext-${id}`).value.trim();

  const options = [
    document.getElementById(`opt1-${id}`).value.trim(),
    document.getElementById(`opt2-${id}`).value.trim(),
    document.getElementById(`opt3-${id}`).value.trim(),
    document.getElementById(`opt4-${id}`).value.trim()
  ];

  const correctAnswer = document.getElementById(`ans-${id}`).value.trim();

  try {
    const response = await fetch(`${LIVE_BACKEND_URL}/tests/admin/questions/${id}`, {
      method: "PUT",
      headers: adminHeaders(),
      body: JSON.stringify({
        examType,
        question,
        options,
        correctAnswer
      })
    });

    const data = await response.json();

    if (response.ok) {
      alert("Question updated successfully.");
      await loadQuestionsPreview();
      await loadQuestionCount();
    } else {
      alert(data.error || "Update failed.");
    }

  } catch (err) {
    console.error("UPDATE ERROR:", err);
    alert("Update error: " + err.message);
  }
}

/* DELETE SINGLE QUESTION */
async function deleteSingleQuestion(id) {
  const confirmDelete = confirm("Are you sure you want to delete this question?");

  if (!confirmDelete) return;

  try {
    const response = await fetch(
      `${LIVE_BACKEND_URL}/tests/admin/questions/${id}`,
      {
        method: "DELETE",
        headers: adminHeaders()
      }
    );

    const data = await response.json();

    if (response.ok) {
      alert("Question deleted successfully.");
      await loadQuestionCount();
      await loadQuestionsPreview();
    } else {
      alert(data.error || "Delete failed.");
    }

  } catch (err) {
    console.error("DELETE QUESTION ERROR:", err);
    alert("Delete error: " + err.message);
  }
}

/* SEARCH QUESTIONS */
document.getElementById("searchQuestionInput").addEventListener("input", (e) => {
  const keyword = e.target.value.toLowerCase();

  const filtered = allQuestions.filter(q =>
    (q.question || "").toLowerCase().includes(keyword)
  );

  renderQuestions(filtered.slice(0, 50));
});

/* LOAD ADMIN RESULTS */
async function loadAdminResults() {
  const container = document.getElementById("resultsContainer");
  const exam = getSelectedExam();

  container.innerHTML = "Loading results...";

  try {
    const response = await fetch(
      `${LIVE_BACKEND_URL}/tests/admin/results?exam=${exam}`,
      { headers: adminHeaders() }
    );

    const results = await response.json();

    if (!response.ok) {
      container.innerHTML = results.error || "Failed to load results.";
      return;
    }

    if (results.length === 0) {
      container.innerHTML = `No ${getExamLabel()} results found.`;
      return;
    }

    container.innerHTML = results.map((r, index) => `
      <div style="border:1px solid #ddd;padding:12px;margin-bottom:12px;border-radius:8px;">
        <h4>#${index + 1} ${r.userId?.username || "Unknown Student"}</h4>
        <p>Email: ${r.userId?.email || "N/A"}</p>
        <p>Exam: ${r.examType || exam}</p>
        <p>Score: ${r.score} / ${r.totalQuestions}</p>
        <p>Percentage: ${r.percentage}%</p>
        <p>Date: ${new Date(r.createdAt).toLocaleString()}</p>

        <button onclick="deleteSingleResult('${r._id}')" class="btn" style="background:#dc2626;margin-top:10px;">
          Delete Result
        </button>
      </div>
    `).join("");

  } catch (err) {
    console.error("RESULTS ERROR:", err);
    container.innerHTML = "Network error while loading results.";
  }
}

document.getElementById("loadResultsBtn").addEventListener("click", loadAdminResults);

/* DELETE SINGLE RESULT */
async function deleteSingleResult(id) {
  const confirmDelete = confirm("Are you sure you want to delete this result?");

  if (!confirmDelete) return;

  try {
    const response = await fetch(`${LIVE_BACKEND_URL}/tests/admin/results/${id}`, {
      method: "DELETE",
      headers: adminHeaders()
    });

    const data = await response.json();

    if (response.ok) {
      alert("Result deleted successfully.");
      await loadAdminResults();
      await loadAdminAnalytics();
    } else {
      alert(data.error || "Delete failed.");
    }

  } catch (err) {
    console.error("DELETE RESULT ERROR:", err);
    alert("Delete error: " + err.message);
  }
}

/* ADMIN ANALYTICS */
async function loadAdminAnalytics() {
  try {
    const exam = getSelectedExam();

    const response = await fetch(
      `${LIVE_BACKEND_URL}/tests/admin/results?exam=${exam}`,
      { headers: adminHeaders() }
    );

    const results = await response.json();

    if (!response.ok || !Array.isArray(results)) return;

    document.getElementById("totalResultsCard").textContent = results.length;

    let highestScore = 0;
    let totalPercentage = 0;
    const uniqueStudents = new Set();

    results.forEach(r => {
      if (r.score > highestScore) {
        highestScore = r.score;
      }

      totalPercentage += Number(r.percentage || 0);

      if (r.userId?._id) {
        uniqueStudents.add(r.userId._id);
      }
    });

    const avg =
      results.length > 0
        ? (totalPercentage / results.length).toFixed(2)
        : 0;

    document.getElementById("highestScoreCard").textContent = highestScore;
    document.getElementById("avgPercentageCard").textContent = avg + "%";
    document.getElementById("studentsCard").textContent = uniqueStudents.size;

  } catch (err) {
    console.error("ANALYTICS ERROR:", err);
  }
}

/* CHANGE EXAM TYPE */
document.getElementById("examType").addEventListener("change", async () => {
  document.getElementById("editorConsole").value = "";
  document.getElementById("searchQuestionInput").value = "";

  await loadQuestionCount();
  await loadQuestionsPreview();
  await loadAdminAnalytics();

  document.getElementById("resultsContainer").innerHTML = "";
});

/* ADMIN LOGOUT */
document.getElementById("adminLogoutBtn").addEventListener("click", () => {
  localStorage.removeItem("admin_logged_in");
  localStorage.removeItem("token");
  localStorage.removeItem("adminToken");
  localStorage.removeItem("authToken");

  alert("Admin logged out successfully.");
  window.location.href = "admin-login.html";
});

/* AUTO LOAD */
loadQuestionCount();
loadQuestionsPreview();
loadAdminAnalytics();
</script>

</body>
</html>
