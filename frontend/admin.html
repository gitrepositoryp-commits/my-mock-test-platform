<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - Smart PDF Bulk Uploader</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body>

  <nav>
    <div class="container nav-container">
      <a href="dashboard.html" class="logo">MockExam Pro (Admin Panels)</a>
      <button onclick="window.location.href='dashboard.html'" class="btn" style="width:auto; padding: 5px 15px;">Student Dashboard</button>
    </div>
  </nav>

  <main class="container auth-wrapper" style="min-height: 85vh; max-width: 800px; margin: 0 auto; display: block; padding-top: 30px;">
    
    <div class="card" style="padding: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);">
      <h2 style="text-align: center; margin-bottom: 5px;">Smart PDF Question Uploader</h2>
      <p style="text-align: center; color: #64748b; font-size: 14px; margin-bottom: 25px;">
        Extracts your 100 General Awareness, Math, and Reasoning questions cleanly[cite: 2684, 2693]. Handles varying layouts automatically.
      </p>

      <div class="form-group" style="background: #f8fafc; border: 2px dashed var(--border-color); padding: 25px; border-radius: 8px; text-align: center;">
        <input type="file" id="pdfFileInput" accept=".pdf" style="font-size: 15px; cursor: pointer;">
      </div>

      <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px;">
        <button id="readPdfBtn" class="btn" style="background-color: #2563eb;">Read PDF</button>
        <button id="convertTextBtn" class="btn" style="background-color: #3b82f6;">Convert PDF Text to Questions</button>
      </div>

      <div class="form-group" style="margin-top: 25px;">
        <label for="pdfTextPreview" style="font-weight: bold; margin-bottom: 8px; display: block;">PDF Data Preview & Final Output Verification Console</label>
        <textarea id="pdfTextPreview" style="width: 100%; height: 300px; padding: 12px; border: 1px solid var(--border-color); border-radius: 6px; font-family: monospace; font-size: 13px; resize: vertical; outline: none; background: #fafafa; line-height: 1.6;" placeholder="PDF text rows will appear here..." readonly></textarea>
      </div>

      <button id="executeUploadBtn" class="btn" style="background-color: var(--success); margin-top: 15px; display: none; font-size: 16px; padding: 14px;">
        🚀 All Clear! Confirm & Upload Structured Questions to MongoDB
      </button>
    </div>

  </main>

  <script>
    // Point global work instances cleanly to secure background processing CDN layers
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const LIVE_BACKEND_URL = 'https://my-mock-test-platform.onrender.com/api';
    let extractedRawText = "";
    let formattedQuestionsPayload = [];

    // CORE ACTION 1: Read the binary streams of the selected PDF container document
    document.getElementById('readPdfBtn').addEventListener('click', async () => {
      const fileInput = document.getElementById('pdfFileInput');
      const previewArea = document.getElementById('pdfTextPreview');
      
      if (fileInput.files.length === 0) {
        alert("Please select a valid PDF question paper file first.");
        return;
      }

      previewArea.value = "Reading document layout contents... Please wait patiently.";
      const file = fileInput.files[0];
      const fileReader = new FileReader();

      fileReader.onload = async function() {
        try {
          const typedarray = new Uint8Array(this.result);
          const pdf = await pdfjsLib.getDocument(typedarray).promise;
          let fullTextContent = "";

          for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textDoc = await page.getTextContent();
            
            // Extract the strings and normalize irregular layout spaces
            const pageStrings = textDoc.items.map(item => item.str);
            fullTextContent += pageStrings.join(" ") + "\n";
          }

          extractedRawText = fullTextContent;
          previewArea.value = extractedRawText;
          alert(`Successfully extracted text data lines from all ${pdf.numPages} pages cleanly!`);
        } catch (err) {
          console.error(err);
          previewArea.value = "System Error: Failed parsing binary text vectors out of your document stream.";
        }
      };

      fileReader.readAsArrayBuffer(file);
    });

    // CORE ACTION 2: Smart Flexible regex text parsing logic architecture
    document.getElementById('convertTextBtn').addEventListener('click', () => {
      const previewArea = document.getElementById('pdfTextPreview');
      if (!extractedRawText.trim()) {
        alert("Please click 'Read PDF' to scan text fields before running conversion formatting calculations.");
        return;
      }

      previewArea.value = "Executing smart parsing filters across text buffers...";

      // Clean multiple consecutive blank spacings, but keep lines readable
      let standardizedText = extractedRawText.replace(/[ \t]+/g, ' ');

      // Split text cleanly wherever a question number starts (e.g., "1.", "Q2.", "100.")
      const rawQuestionBlocks = standardizedText.split(/(?=\bQ?\d+[\.\:\)\s]+)/g);
      formattedQuestionsPayload = [];

      rawQuestionBlocks.forEach(block => {
        if (!block.trim() || block.length < 15) return;

        // HIGHLY BULLETPROOF REGEX EXTRACOR ENGINE MATRIX:
        // Captures Question, Option A, Option B, Option C, Option D, and the Answer Key string
        const bulletproofRegex = /(?:Q?\d+[\.\:\)\s]+)?(.+?)(?:\(?[A-a][\.\:\)\s]+|[^a-zA-Z]A\s+)(.+?)(?:\(?[B-b][\.\:\)\s]+|[^a-zA-Z]B\s+)(.+?)(?:\(?[C-c][\.\:\)\s]+|[^a-zA-Z]C\s+)(.+?)(?:\(?[D-d][\.\:\)\s]+|[^a-zA-Z]D\s+)(.+?)(?:Ans(?:wer)?[\.\:\s]*|Correct[\.\:\s]*|[^a-zA-Z]Ans\s*)([A-D,a-d])/i;
        
        const match = block.match(bulletproofRegex);

        if (match) {
          const qText = match[1].trim();
          const optA = match[2].trim();
          const optB = match[3].trim();
          const optC = match[4].trim();
          const optD = match[5].trim();
          const answerLetter = match[6].trim().toUpperCase();

          const optionsArray = [optA, optB, optC, optD];
          
          // Map option array coordinates perfectly based on the correct answer letter
          let correctStringValue = optA;
          if (answerLetter === 'B') correctStringValue = optB;
          if (answerLetter === 'C') correctStringValue = optC;
          if (answerLetter === 'D') correctStringValue = optD;

          formattedQuestionsPayload.push({
            question: qText,
            options: optionsArray,
            correctAnswer: correctStringValue
          });
        }
      });

      // EVALUATION HANDSHAKE STATUS CHECK
      if (formattedQuestionsPayload.length === 0) {
        previewArea.value = "The smart parser was unable to map question rows automatically because of irregular text structuring.\n\n" +
          "💡 PRO-TIP FOR SUCCESS:\n Ensure your questions in the PDF are structured clearly with options and an answer line like this:\n\n" +
          "1. This is your mock exam question text string?\n" +
          "A) First Option text  B) Second Option text  C) Third Option text  D) Fourth Option text\n" +
          "Answer: A";
        alert("Parsing format mismatch! Review the guide text generated in the preview box to ensure perfect structure mapping.");
      } else {
        // Output formatted data cleanly on screen for review
        previewArea.value = `🎉 SUCCESS! Smart validation engine successfully found and structured ${formattedQuestionsPayload.length} question blocks!\n\nPayload Review Array preview below:\n\n` + JSON.stringify(formattedQuestionsPayload, null, 2);
        document.getElementById('executeUploadBtn').style.display = "block";
        alert(`Successfully formatted ${formattedQuestionsPayload.length} exam items matching standard choice layouts!`);
      }
    });

    // CORE ACTION 3: Dispatch batch payload directly over the network tunnel straight to MongoDB Atlas
    document.getElementById('executeUploadBtn').addEventListener('click', async () => {
      if (formattedQuestionsPayload.length === 0) return;

      try {
        const response = await fetch(`${LIVE_BACKEND_URL}/tests/bulk-questions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ questionsArray: formattedQuestionsPayload })
        });
        const data = await response.json();

        if (response.ok) {
          alert(data.message || `Victory! Successfully committed ${formattedQuestionsPayload.length} questions straight into MongoDB Atlas!`);
          window.location.href = 'dashboard.html';
        } else {
          alert(data.error || "The cloud database transaction was rejected by cluster handlers.");
        }
      } catch (err) {
        console.error(err);
        alert("Network routing fault connecting to remote cloud production API endpoints.");
      }
    });
  </script>
</body>
</html>
