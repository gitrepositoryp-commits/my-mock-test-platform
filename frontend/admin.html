<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - Bulk Uploader</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
    .admin-tab-btn { padding: 8px 16px; border: none; background: #e2e8f0; color: #475569; font-weight: bold; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
    .admin-tab-btn.active { background: #2563eb; color: white; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>

<body>

<nav>
  <div class="container nav-container">
    <a href="dashboard.html" class="logo">MockExam Pro Admin</a>
    <button id="adminLogoutBtn" class="btn" style="width:auto;padding:8px 15px;background:#dc2626;">
      Logout
    </button>
  </div>
</nav>

<main class="container auth-wrapper" style="min-height:85vh; max-width:950px; margin:0 auto; display:block; padding-top:30px;">

  <div class="card" style="padding:30px;">
    <h2 style="text-align:center;">Universal PDF Question Uploader</h2>
    
    <div class="card" style="margin-top:20px;padding:20px;">
      <h3>➕ Manual Add Question</h3>
      <textarea id="manualQuestion" placeholder="Enter question" style="width:100%;height:80px;padding:10px;margin-top:10px;"></textarea>

      <input id="manualOpt1" placeholder="Option A" style="width:100%;padding:10px;margin-top:8px;">
      <input id="manualOpt2" placeholder="Option B" style="width:100%;padding:10px;margin-top:8px;">
      <input id="manualOpt3" placeholder="Option C" style="width:100%;padding:10px;margin-top:8px;">
      <input id="manualOpt4" placeholder="Option D" style="width:100%;padding:10px;margin-top:8px;">

      <select id="manualCorrect" style="width:100%;padding:10px;margin-top:8px;">
        <option value="1">Correct Answer: Option A</option>
        <option value="2">Correct Answer: Option B</option>
        <option value="3">Correct Answer: Option C</option>
        <option value="4">Correct Answer: Option D</option>
      </select>

      <select id="manualCategory" style="width:100%;padding:10px;margin-top:8px;">
        <option value="General Awareness">General Awareness</option>
        <option value="Maths">Maths</option>
        <option value="Reasoning">Reasoning</option>
        <option value="General Science">General Science</option>
      </select>

      <button id="manualAddBtn" class="btn" style="background:#16a34a;margin-top:12px;">
        Add This Question
      </button>
    </div>

    <div style="margin:20px 0;">
      <label style="font-weight:bold;">Select Exam Type</label>
      <select id="examType" style="width:100%;padding:12px;margin-top:8px;border-radius:8px;"></select>
    </div>

    <div style="text-align:center; margin:15px 0; padding:15px; background:#f1f5f9; border-radius:8px;">
      <h3 id="questionCountDisplay" style="margin:0;color:#2563eb;">Total Questions: Loading...</h3>
    </div>

    <div class="card" style="margin-top:20px;padding:20px;">
      <h3>📈 Admin Analytics</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-top:15px;">
        <div style="background:#eff6ff;padding:15px;border-radius:8px;text-align:center;"><h2 id="totalResultsCard">0</h2><p>Total Results</p></div>
        <div style="background:#ecfdf5;padding:15px;border-radius:8px;text-align:center;"><h2 id="highestScoreCard">0</h2><p>Highest Score</p></div>
        <div style="background:#fef3c7;padding:15px;border-radius:8px;text-align:center;"><h2 id="avgPercentageCard">0%</h2><p>Average %</p></div>
        <div style="background:#f3e8ff;padding:15px;border-radius:8px;text-align:center;"><h2 id="studentsCard">0</h2><p>Students</p></div>
      </div>
    </div>

    <div class="card" style="margin-top:20px;padding:20px;">
      <h3>📊 Student Results</h3>
      <button id="loadResultsBtn" class="btn" style="background:#7c3aed;margin-top:10px;">Load Results</button>
      <div id="resultsContainer" style="margin-top:20px;"></div>
    </div>

    <div class="card" style="margin-top:20px;padding:20px;">
      <h3>💰 Premium Payments</h3>
      <button id="loadPaymentsBtn" class="btn" style="background:#16a34a;margin-top:10px;">Load Payments</button>
      <div id="paymentsContainer" style="margin-top:20px;"></div>
    </div>

    <div class="card" style="margin-top:20px;padding:20px;">
      <h3>🔍 Section Filter & Live Preview</h3>
      
      <div class="admin-tabs">
        <button class="admin-tab-btn active" onclick="filterAdminPreview('All')">All Sections</button>
        <button class="admin-tab-btn" onclick="filterAdminPreview('Maths')">Maths</button>
        <button class="admin-tab-btn" onclick="filterAdminPreview('Reasoning')">Reasoning</button>
        <button class="admin-tab-btn" onclick="filterAdminPreview('General Science')">General Science</button>
        <button class="admin-tab-btn" onclick="filterAdminPreview('General Awareness')">General Awareness</button>
      </div>

      <input type="text" id="searchQuestionInput" placeholder="Type keyword to refine search inside active tab..." style="width:100%;padding:10px;margin-bottom:15px;">
      <div id="questionPreviewContainer" style="margin-top:20px;"></div>
    </div>

    <div class="form-group" style="background:#f8fafc;border:2px dashed #ddd;padding:20px;border-radius:8px;text-align:center;margin-top:20px;">
      <input type="file" id="pdfFileInput" accept=".pdf">
    </div>

    <div style="display:flex;gap:15px;margin-top:20px;flex-wrap:wrap;">
      <button id="readPdfBtn" class="btn" style="background:#2563eb;flex:1;">Step 1: Read PDF</button>
      <button id="smartParseBtn" class="btn" style="background:#0284c7;flex:1;">Step 2: Convert To JSON</button>
    </div>

    <textarea id="editorConsole" style="width:100%;height:420px;margin-top:25px;padding:12px;font-family:monospace;font-size:13px;"></textarea>

    <button id="deleteAllBtn" class="btn" style="background:#dc2626;margin-top:15px;font-size:16px;padding:14px;">
      🗑 Delete Selected Exam Questions
    </button>

    <button id="executeUploadBtn" class="btn" style="background:green;margin-top:15px;font-size:16px;padding:14px;">
      🚀 Upload Questions to Selected Exam
    </button>
  </div>

</main>

<script>
const LIVE_BACKEND_URL = "https://my-mock-test-platform.onrender.com/api";
let currentAdminTab = "All";

function getAdminToken() {
  return localStorage.getItem("token") || localStorage.getItem("adminToken") || localStorage.getItem("authToken");
}

function adminHeaders() {
  return { "Content-Type": "application/json", "Authorization": `Bearer ${getAdminToken()}` };
}

if (localStorage.getItem("admin_logged_in") !== "true" || !getAdminToken()) {
  alert("Admin session expired. Please login again.");
  window.location.href = "admin-login.html";
}

const pdfjsLib = window["pdfjs-dist/build/pdf"];
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

let allQuestions = [];

document.getElementById("manualAddBtn").addEventListener("click", async () => {
  const examType = getSelectedExam();
  const question = document.getElementById("manualQuestion").value.trim();
  const category = document.getElementById("manualCategory").value;
  const options = [
    document.getElementById("manualOpt1").value.trim(),
    document.getElementById("manualOpt2").value.trim(),
    document.getElementById("manualOpt3").value.trim(),
    document.getElementById("manualOpt4").value.trim()
  ];
  const correctAnswer = options[Number(document.getElementById("manualCorrect").value) - 1];

  if (!question || options.some(opt => !opt) || !correctAnswer) {
    alert("Please fill all fields."); return;
  }

  try {
    const response = await fetch(`${LIVE_BACKEND_URL}/tests/bulk-questions`, {
      method: "POST",
      headers: adminHeaders(),
      body: JSON.stringify({ examType, questionsArray: [{ examType, question, options, correctAnswer, category }] })
    });
    if (response.ok) {
      alert("Question manually captured!");
      document.getElementById("manualQuestion").value = "";
      await loadQuestionCount(); await loadQuestionsPreview();
    }
  } catch (err) { alert(err.message); }
});

const examGroups = [
  { label: "RRB NTPC Graduate", prefix: "NTPC_PG" },
  { label: "RRB NTPC Undergraduate", prefix: "NTPC_UG" },
  { label: "RRB ALP", prefix: "ALP" },
  { label: "Technician Grade-1", prefix: "TECH_G1" },
  { label: "Technician Grade-3", prefix: "TECH_G3" },
  { label: "RRB Group-D", prefix: "GROUP_D" },
  { label: "AP Group-2", prefix: "GROUP_2" }
];

function populateExamDropdown() {
  const select = document.getElementById("examType");
  examGroups.forEach(group => {
    const freeHeader = document.createElement("optgroup"); freeHeader.label = `${group.label} - FREE`;
    for (let i = 1; i <= 3; i++) {
      const opt = document.createElement("option"); opt.value = `${group.prefix}_FREE_${i}`; opt.textContent = `${group.label} Free Mock ${i}`; freeHeader.appendChild(opt);
    }
    select.appendChild(freeHeader);
    const premHeader = document.createElement("optgroup"); premHeader.label = `${group.label} - PREMIUM`;
    for (let i = 1; i <= 30; i++) {
      const opt = document.createElement("option"); opt.value = `${group.prefix}_PREMIUM_${i}`; opt.textContent = `🔒 ${group.label} Premium Mock ${i}`; premHeader.appendChild(opt);
    }
    select.appendChild(premHeader);
  });
}
populateExamDropdown();

function getSelectedExam() { return document.getElementById("examType").value; }

async function loadQuestionCount() {
  try {
    const exam = getSelectedExam();
    const response = await fetch(`${LIVE_BACKEND_URL}/tests/admin/questions?exam=${exam}`, { headers: adminHeaders() });
    const data = await response.json();
    if (response.ok && Array.isArray(data)) {
      document.getElementById("questionCountDisplay").textContent = `${getSelectedExam()} Total Count: ${data.length}`;
    }
  } catch (err) { console.error(err); }
}

document.getElementById("readPdfBtn").addEventListener("click", async () => {
  const fileInput = document.getElementById("pdfFileInput");
  const consoleArea = document.getElementById("editorConsole");
  if (fileInput.files.length === 0) { alert("Choose a PDF file first."); return; }
  consoleArea.value = "Reading PDF content payload into workspace console storage area...";
  
  const fileReader = new FileReader();
  fileReader.onload = async function () {
    try {
      const typedarray = new Uint8Array(this.result);
      const pdf = await pdfjsLib.getDocument({ data: typedarray }).promise;
      let fullText = "";
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        fullText += textContent.items.map(item => item.str).join(" ") + "\n";
      }
      consoleArea.value = fullText; alert("PDF reading complete. Go to Step 2.");
    } catch (err) { alert(err.message); }
  };
  fileReader.readAsArrayBuffer(fileInput.files[0]);
});

function parseQuestions(text) {
  text = text.replace(/\r/g, " ").replace(/\s+/g, " ").trim();
  const blocks = text.split(/(?=Q\.\s*\d+)/gi); const questions = []; const examType = getSelectedExam();

  blocks.forEach(block => {
    block = block.trim(); if (!block || !/^Q\.\s*\d+/i.test(block)) return;
    const qNoMatch = block.match(/Q\.\s*(\d+)/i); const qNo = qNoMatch ? Number(qNoMatch[1]) : 0;
    if (qNo === 0) return;

    let assignedCategory = "General Awareness"; 
    if ((qNo >= 2 && qNo <= 3) || qNo === 7 || qNo === 11 || qNo === 13 || qNo === 18 || qNo === 19 || qNo === 24 || qNo === 26 || qNo === 29 || qNo === 31 || qNo === 33 || qNo === 44 || qNo === 45 || qNo === 47 || qNo === 49 || qNo === 50 || qNo === 51 || qNo === 52 || qNo === 53 || qNo === 56 || qNo === 58 || qNo === 63 || qNo === 70 || qNo === 73 || qNo === 77 || qNo === 83 || qNo === 88) {
      assignedCategory = "Maths";
    } else if (qNo === 5 || qNo === 9 || qNo === 10 || qNo === 17 || qNo === 23 || qNo === 25 || qNo === 27 || qNo === 28 || qNo === 30 || qNo === 35 || qNo === 36 || qNo === 37 || qNo === 41 || qNo === 46 || qNo === 57 || qNo === 59 || qNo === 62 || qNo === 65 || qNo === 71 || qNo === 76 || qNo === 78 || qNo === 80 || qNo === 81 || qNo === 82 || qNo === 84 || qNo === 86 || qNo === 93 || qNo === 99 || qNo === 100) {
      assignedCategory = "Reasoning";
    } else if (qNo === 4 || qNo === 42 || qNo === 43 || qNo === 60) {
      assignedCategory = "General Science";
    }

    let questionText = ""; const qMatch = block.match(/Q\.\s*\d+\s+([\s\S]*?)(?=\s+(?:Ans|A\.)\s*)/i);
    if (qMatch) questionText = qMatch[1].trim().replace(/\(Use the empirical formula to find the answer\)/gi, "").trim(); else return;

    const options = []; let correctOptionText = "";
    const optionMatches = [...block.matchAll(/(?:X|☑|✔)*\s*([A-D])\.\s*([\s\S]*?)(?=\s+(?:[A-D]\.|Ans|Q\.)|$)/gi)];
    const rawChoices = {}; let matchedCorrectLetter = "";

    if (block.includes("✔")) {
      const correctLetterMatch = block.match(/✔+(A|B|C|D)/i); if (correctLetterMatch) matchedCorrectLetter = correctLetterMatch[1].toUpperCase();
    }
    optionMatches.forEach(m => {
      const letter = m[1].toUpperCase(); let optBody = m[2].trim().replace(/Adda\s*247|A\s*Google\s*Play/gi, "").trim();
      if (optBody && !rawChoices[letter]) rawChoices[letter] = optBody;
    });
    ["A", "B", "C", "D"].forEach(letter => {
      if (rawChoices[letter]) {
        options.push(rawChoices[letter]); if (letter === matchedCorrectLetter) correctOptionText = rawChoices[letter];
      }
    });
    if (!correctOptionText && options.length > 0) correctOptionText = options[0];
    if (questionText && options.length >= 4) {
      questions.push({ examType, question: questionText, options: options.slice(0, 4), correctAnswer: correctOptionText, category: assignedCategory });
    }
  });
  return questions;
}

document.getElementById("smartParseBtn").addEventListener("click", () => {
  const consoleArea = document.getElementById("editorConsole"); const text = consoleArea.value.trim();
  if (!text) { alert("Parse engine data source empty."); return; }
  const parsed = parseQuestions(text);
  if (parsed.length === 0) { alert("Format reading array discrepancy isolated."); return; }
  consoleArea.value = JSON.stringify(parsed, null, 2);
  alert(`Processed ${parsed.length} items to memory storage compilation views.`);
});

document.getElementById("executeUploadBtn").addEventListener("click", async () => {
  const consoleArea = document.getElementById("editorConsole"); const examType = getSelectedExam();
  let questionsArray;
  try { questionsArray = JSON.parse(consoleArea.value.trim()); } catch (err) { alert("Run Step 2 first."); return; }

  questionsArray = questionsArray.map(q => ({ ...q, examType }));
  try {
    const response = await fetch(`${LIVE_BACKEND_URL}/tests/bulk-questions`, {
      method: "POST", headers: adminHeaders(), body: JSON.stringify({ examType, questionsArray })
    });
    if (response.ok) {
      alert("Questions uploaded with dynamic subject groupings.");
      await loadQuestionCount(); await loadQuestionsPreview(); await loadAdminAnalytics();
    }
  } catch (err) { alert("Upload mapping error."); }
});

document.getElementById("deleteAllBtn").addEventListener("click", async () => {
  const exam = getSelectedExam(); if (!confirm("Flush data logs for selected module?")) return;
  try {
    const res = await fetch(`${LIVE_BACKEND_URL}/tests/questions/delete-all?exam=${exam}`, { method: "DELETE", headers: adminHeaders() });
    if (res.ok) { alert("Deleted."); await loadQuestionCount(); await loadQuestionsPreview(); }
  } catch (err) { console.error(err); }
});

async function loadQuestionsPreview() {
  try {
    const exam = getSelectedExam();
    const response = await fetch(`${LIVE_BACKEND_URL}/tests/admin/questions?exam=${exam}`, { headers: adminHeaders() });
    const data = await response.json();
    if (response.ok) { allQuestions = data; renderQuestions(allQuestions); }
  } catch (err) { console.error(err); }
}

function filterAdminPreview(category) {
  currentAdminTab = category;
  document.querySelectorAll(".admin-tab-btn").forEach(btn => {
    btn.classList.toggle("active", btn.textContent.trim() === category || (category === "All" && btn.textContent.trim() === "All Sections"));
  });
  applyAdminFilter();
}

function applyAdminFilter() {
  const searchVal = document.getElementById("searchQuestionInput").value.toLowerCase();
  const filtered = allQuestions.filter(q => {
    const matchesTab = (currentAdminTab === "All" || q.category === currentAdminTab);
    const matchesSearch = (q.question || "").toLowerCase().includes(searchVal);
    return matchesTab && matchesSearch;
  });
  renderQuestions(filtered);
}

document.getElementById("searchQuestionInput").addEventListener("input", applyAdminFilter);

function renderQuestions(questions) {
  const container = document.getElementById("questionPreviewContainer"); container.innerHTML = "";
  const displaySlice = questions.slice(0, 30);
  if (displaySlice.length === 0) { container.innerHTML = "<p>No entries matching current parameters filter.</p>"; return; }

  displaySlice.forEach((q, index) => {
    const card = document.createElement("div"); card.style.border = "1px solid #ddd"; card.style.padding = "15px"; card.style.marginBottom = "15px"; card.style.borderRadius = "8px";
    card.innerHTML = `
      <h4>Q${index + 1} - Section group: <strong style="color:#7c3aed;">${q.category || "General Awareness"}</strong></h4>
      <textarea id="qtext-${q._id}" style="width:100%;height:70px;">${q.question || ""}</textarea>
      <input id="opt1-${q._id}" value="${q.options?.[0] || ""}" style="width:100%;margin-top:4px;padding:6px;">
      <input id="opt2-${q._id}" value="${q.options?.[1] || ""}" style="width:100%;margin-top:4px;padding:6px;">
      <input id="opt3-${q._id}" value="${q.options?.[2] || ""}" style="width:100%;margin-top:4px;padding:6px;">
      <input id="opt4-${q._id}" value="${q.options?.[3] || ""}" style="width:100%;margin-top:4px;padding:6px;">
      <input id="ans-${q._id}" value="${q.correctAnswer || ""}" style="width:100%;margin-top:4px;padding:6px;color:green;font-weight:bold;">
      <input id="cat-${q._id}" value="${q.category || "General Awareness"}" style="width:100%;margin-top:4px;padding:6px;color:purple;">
      <button onclick="updateQuestion('${q._id}')" class="btn" style="background:#2563eb;margin-top:8px;padding:5px 10px;font-size:12px;">Save Modifications</button>
    `;
    container.appendChild(card);
  });
}

async function updateQuestion(id) {
  const examType = getSelectedExam();
  const question = document.getElementById(`qtext-${id}`).value.trim();
  const correctAnswer = document.getElementById(`ans-${id}`).value.trim();
  const category = document.getElementById(`cat-${id}`).value.trim();
  const options = [
    document.getElementById(`opt1-${id}`).value.trim(), document.getElementById(`opt2-${id}`).value.trim(),
    document.getElementById(`opt3-${id}`).value.trim(), document.getElementById(`opt4-${id}`).value.trim()
  ];
  try {
    const res = await fetch(`${LIVE_BACKEND_URL}/tests/admin/questions/${id}`, {
      method: "PUT", headers: adminHeaders(), body: JSON.stringify({ examType, question, options, correctAnswer, category })
    });
    if (res.ok) alert("Saved change properties successfully.");
  } catch (err) { alert("Save error."); }
}

async function loadAdminResults() {
  const container = document.getElementById("resultsContainer"); const exam = getSelectedExam(); container.innerHTML = "Syncing dataset logs...";
  try {
    const response = await fetch(`${LIVE_BACKEND_URL}/tests/admin/results?exam=${exam}`, { headers: adminHeaders() });
    const results = await response.json(); if (!response.ok) return;
    container.innerHTML = results.map(r => `<p>User: ${r.userId?.username || "Guest"} - Evaluation Performance: ${r.percentage}%</p>`).join("");
  } catch (err) { container.innerHTML = "Exception pulling files."; }
}
document.getElementById("loadResultsBtn").addEventListener("click", loadAdminResults);

async function loadAdminAnalytics() {
  try {
    const exam = getSelectedExam();
    const response = await fetch(`${LIVE_BACKEND_URL}/tests/admin/results?exam=${exam}`, { headers: adminHeaders() });
    const results = await response.json(); if (!response.ok || !Array.isArray(results)) return;
    document.getElementById("totalResultsCard").textContent = results.length;
  } catch (err) { console.error(err); }
}

async function loadPayments() {
  const container = document.getElementById("paymentsContainer"); container.innerHTML = "Loading...";
  try {
    const response = await fetch(`${LIVE_BACKEND_URL}/payment/admin/payments`, { headers: adminHeaders() });
    const data = await response.json();
    container.innerHTML = data.map(p => `<p>Payment transaction confirmed: ₹${p.amount}</p>`).join("");
  } catch (e) { container.innerHTML = "Error syncing gateways logs."; }
}
document.getElementById("loadPaymentsBtn").addEventListener("click", loadPayments);

document.getElementById("examType").addEventListener("change", async () => {
  await loadQuestionCount(); await loadQuestionsPreview(); await loadAdminAnalytics();
});

loadQuestionCount(); loadQuestionsPreview(); loadAdminAnalytics();
</script>
</body>
</html>
