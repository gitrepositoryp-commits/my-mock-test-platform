<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Portal - Bulk Uploader</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>

<body>

<nav>
  <div class="container nav-container">
    <a href="dashboard.html" class="logo">MockExam Pro (Admin Control)</a>
    <button onclick="window.location.href='dashboard.html'" class="btn" style="width:auto; padding:5px 15px;">Dashboard</button>
  </div>
</nav>

<main class="container auth-wrapper" style="min-height:85vh; max-width:900px; margin:0 auto; display:block; padding-top:30px;">

  <div class="card" style="padding:30px;">
    <h2 style="text-align:center;">Universal PDF Question Uploader</h2>

    <div class="form-group" style="background:#f8fafc; border:2px dashed #ddd; padding:20px; border-radius:8px; text-align:center;">
      <input type="file" id="pdfFileInput" accept=".pdf">
    </div>

    <div style="display:flex; gap:15px; margin-top:20px;">
      <button id="readPdfBtn" class="btn" style="background:#2563eb; flex:1;">Step 1: Read PDF</button>
      <button id="smartParseBtn" class="btn" style="background:#0284c7; flex:1;">Step 2: Convert To JSON</button>
    </div>

    <textarea id="editorConsole" style="width:100%; height:420px; margin-top:25px; padding:12px; font-family:monospace; font-size:13px;"></textarea>

    <button id="executeUploadBtn" class="btn" style="background:green; margin-top:15px; font-size:16px; padding:14px;">
      🚀 Upload Questions to MongoDB
    </button>
  </div>

</main>

<script>
const pdfjsLib = window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

const LIVE_BACKEND_URL = 'https://rrb-mock-backend.onrender.com/api';

/* READ PDF */
document.getElementById('readPdfBtn').addEventListener('click', async () => {
  const fileInput = document.getElementById('pdfFileInput');
  const consoleArea = document.getElementById('editorConsole');

  if (fileInput.files.length === 0) {
    alert("Please choose PDF first.");
    return;
  }

  consoleArea.value = "Reading PDF... please wait.";

  const fileReader = new FileReader();

  fileReader.onload = async function () {
    try {
      const typedarray = new Uint8Array(this.result);
      const pdf = await pdfjsLib.getDocument({ data: typedarray }).promise;

      let fullText = "";

      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        const pageText = textContent.items.map(item => item.str).join(" ");
        fullText += pageText + "\n";
      }

      consoleArea.value = fullText;
      alert("PDF loaded successfully. Now click Step 2.");
    } catch (err) {
      console.error(err);
      alert("PDF read error: " + err.message);
    }
  };

  fileReader.readAsArrayBuffer(fileInput.files[0]);
});

/* PARSER */
function parseQuestions(text) {
  text = text.replace(/\s+/g, " ").trim();

  let blocks = text.split(/(?=Q\.?\s*\d+)/gi);

  if (blocks.length <= 1) {
    blocks = text.split(/(?=\b\d+\s*[\.\)]\s+)/g);
  }

  const questions = [];

  blocks.forEach(block => {
    block = block.trim();
    if (block.length < 20) return;

    let questionText = "";
    let options = [];

    const qMatch = block.match(/Q\.?\s*\d+\.?\s*([\s\S]*?)(?=\s+(?:Ans|Answer)\s+|\s+1[\.\)]\s+)/i);

    if (qMatch) {
      questionText = qMatch[1].trim();
    } else {
      questionText = block.replace(/^Q\.?\s*\d+\.?/i, "").trim();
    }

    const optionPartMatch = block.match(/(?:Ans|Answer)\s+([\s\S]*)/i);
    let optionText = optionPartMatch ? optionPartMatch[1] : block;

    const optionRegex = /(?:^|\s)([1-4])[\.\)]\s*(.*?)(?=\s+[1-4][\.\)]\s*|$)/g;
    let match;

    while ((match = optionRegex.exec(optionText)) !== null) {
      let opt = match[2].trim();
      if (opt.length > 0) options.push(opt);
    }

    if (options.length < 4) {
      const abcdRegex = /A[\.\)]\s*(.*?)\s+B[\.\)]\s*(.*?)\s+C[\.\)]\s*(.*?)\s+D[\.\)]\s*(.*)/i;
      const abcd = block.match(abcdRegex);

      if (abcd) {
        options = [
          abcd[1].trim(),
          abcd[2].trim(),
          abcd[3].trim(),
          abcd[4].trim()
        ];
      }
    }

    if (questionText && options.length >= 4) {
      questions.push({
        question: questionText,
        options: options.slice(0, 4),
        correctAnswer: options[0],
        category: "Reasoning"
      });
    }
  });

  return questions;
}

/* CONVERT */
document.getElementById('smartParseBtn').addEventListener('click', () => {
  const consoleArea = document.getElementById('editorConsole');
  const text = consoleArea.value.trim();

  if (!text) {
    alert("Please read PDF first.");
    return;
  }

  const parsed = parseQuestions(text);

  console.log("Detected questions:", parsed.length);

  if (parsed.length === 0) {
    alert("No questions detected. Your PDF format is different.");
    return;
  }

  consoleArea.value = JSON.stringify(parsed, null, 2);
  alert(`Successfully converted ${parsed.length} questions.`);
});

/* UPLOAD */
document.getElementById('executeUploadBtn').addEventListener('click', async () => {
  const consoleArea = document.getElementById('editorConsole');

  let questionsArray;

  try {
    questionsArray = JSON.parse(consoleArea.value.trim());
  } catch (err) {
    alert("JSON error. First click Step 2 Convert To JSON.");
    return;
  }

  if (!Array.isArray(questionsArray)) {
    alert("JSON must be an array.");
    return;
  }

  console.log("Uploading questions:", questionsArray.length);
  console.log("First question:", questionsArray[0]);

  try {
    const response = await fetch(`${LIVE_BACKEND_URL}/tests/bulk-questions`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ questionsArray })
    });

    const data = await response.json();

    if (response.ok) {
      alert(data.message || `Successfully uploaded ${questionsArray.length} questions.`);
      window.location.href = "dashboard.html";
    } else {
      console.error("BACKEND ERROR:", data);
      alert(data.error || "Upload failed.");
    }

  } catch (err) {
    console.error("UPLOAD NETWORK ERROR:", err);
    alert("Network error: " + err.message);
  }
});
</script>

</body>
</html>
