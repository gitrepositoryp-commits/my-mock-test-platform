<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - RRB EDU</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{min-height:100vh;background:linear-gradient(135deg,#f8fbff,#eef2ff)}
.wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{width:430px;padding:35px;background:white;border-radius:22px;box-shadow:0 25px 70px rgba(15,23,42,.12);text-align:center}
h1{margin-bottom:10px}
p{color:#64748b;margin-bottom:20px}
input{width:100%;padding:14px;margin-bottom:12px;border:1px solid #dbe3f0;border-radius:10px;font-size:16px}
button{width:100%;padding:14px;border:none;border-radius:10px;background:#4f46e5;color:white;font-size:17px;font-weight:bold;margin-top:8px;cursor:pointer}
a{display:block;margin-top:18px;color:#7c3aed;text-decoration:none;font-weight:bold}
</style>
</head>
<body>

<div class="wrapper">
  <div class="card">
    <h1>Reset Password</h1>
    <p>Send OTP to your registered email.</p>

    <input type="email" id="email" placeholder="Registered email">
    <button onclick="sendOtp()">Send OTP</button>

    <input type="text" id="otp" placeholder="Enter OTP">
    <input type="password" id="newPassword" placeholder="New password">
    <input type="password" id="confirmPassword" placeholder="Confirm password">

    <button onclick="resetPassword()">Reset Password</button>

    <a href="login.html">Back to Login</a>
  </div>
</div>

<script>
const API_BASE = "https://my-mock-test-platform.onrender.com/api";

async function sendOtp(){
  const email = document.getElementById("email").value.trim();

  if(!email){
    alert("Please enter your registered email.");
    return;
  }

  try{
    const response = await fetch(`${API_BASE}/auth/forgot-password`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ email })
    });

    const data = await response.json();

    if(response.ok){
      alert(data.message || "OTP sent to your email.");
    }else{
      alert(data.error || "Failed to send OTP.");
    }

  }catch(err){
    console.error("OTP ERROR:", err);
    alert("Network error while sending OTP.");
  }
}

async function resetPassword(){
  const email = document.getElementById("email").value.trim();
  const otp = document.getElementById("otp").value.trim();
  const newPassword = document.getElementById("newPassword").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();

  if(!email || !otp || !newPassword || !confirmPassword){
    alert("Please fill all fields.");
    return;
  }

  if(newPassword !== confirmPassword){
    alert("Passwords do not match.");
    return;
  }

  try{
    const response = await fetch(`${API_BASE}/auth/reset-password`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        email,
        otp,
        newPassword
      })
    });

    const data = await response.json();

    if(response.ok){
      alert(data.message || "Password reset successful.");
      window.location.href = "login.html";
    }else{
      alert(data.error || "Password reset failed.");
    }

  }catch(err){
    console.error("RESET ERROR:", err);
    alert("Network error. Try again.");
  }
}
</script>

</body>
</html>
