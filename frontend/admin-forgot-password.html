<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - MockExam Pro</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{min-height:100vh;background:linear-gradient(135deg,#f8fbff,#eef2ff);overflow:hidden}
.bg-wave{position:fixed;right:-120px;bottom:-160px;width:850px;height:520px;background:linear-gradient(135deg,#60a5fa,#7c3aed);border-radius:55% 45% 0 0;z-index:-1}
.wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{width:430px;padding:42px;background:white;border-radius:26px;box-shadow:0 30px 80px rgba(15,23,42,.12);text-align:center}
.icon{width:90px;height:90px;margin:0 auto 25px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);display:flex;align-items:center;justify-content:center;color:white;font-size:40px}
h1{font-size:30px;color:#0f172a;margin-bottom:8px}
p{color:#64748b;margin-bottom:25px}
input{width:100%;padding:16px;border:1px solid #dbe3f0;border-radius:12px;font-size:16px;outline:none;margin-bottom:12px}
button{width:100%;padding:16px;border:none;border-radius:12px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;font-size:18px;font-weight:bold;margin-top:8px;cursor:pointer}
a{display:block;margin-top:20px;color:#7c3aed;text-decoration:none;font-weight:bold}
</style>
</head>

<body>
<div class="bg-wave"></div>

<div class="wrapper">
  <div class="card">
    <div class="icon">🔑</div>
    <h1>Reset Password</h1>
    <p>Enter your email and new password.</p>

    <input type="email" id="email" placeholder="Registered email">
    <input type="password" id="newPassword" placeholder="New password">
    <input type="password" id="confirmPassword" placeholder="Confirm password">

    <button onclick="resetPassword()">Reset Password</button>

    <a href="login.html">Back to Login</a>
  </div>
</div>

<script>
const API_BASE = "https://my-mock-test-platform.onrender.com/api";

async function resetPassword(){
  const email = document.getElementById("email").value.trim();
  const newPassword = document.getElementById("newPassword").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();

  if(!email || !newPassword || !confirmPassword){
    alert("Please fill all fields.");
    return;
  }

  if(newPassword !== confirmPassword){
    alert("Passwords do not match.");
    return;
  }

  try{
    const response = await fetch(`${API_BASE}/auth/reset-password`, {
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        email,
        newPassword
      })
    });

    const data = await response.json();

    if(response.ok){
      alert(data.message);
      window.location.href = "login.html";
    }else{
      alert(data.error || "Password reset failed.");
    }

  }catch(err){
    console.error("RESET ERROR:", err);
    alert("Network error. Try again.");
  }
}
</script>

</body>
</html>
