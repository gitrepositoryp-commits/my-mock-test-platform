<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Exam Workspace - Mock Test Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <div class="container nav-container">
      <a href="dashboard.html" class="logo">MockExam Pro</a>
      <div id="examTimerBanner" class="timer-banner" style="margin-bottom: 0; padding: 8px 16px;">
        Time Remaining: <span id="timerClock">05:00</span>
      </div>
    </div>
  </nav>

  <main class="container test-container">
    <section class="panel-card" style="margin-bottom: 0;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <span style="font-weight: 600; color: var(--primary);" id="questionNumberIndicator">Question 1 of --</span>
        <span style="font-size: 0.85rem; color: var(--text-muted); background: var(--background); padding: 4px 8px; border-radius: 4px;">+1.0 Mark</span>
      </div>

      <h3 id="questionTextDisplay" style="border: none; padding: 0; margin-bottom: 25px; font-size: 1.25rem;">Loading question content...</h3>

      <div id="optionsContainer">
        </div>

      <div style="display: flex; justify-content: space-between; margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px;">
        <button id="prevBtn" class="btn btn-secondary" style="width: auto; margin-top: 0; padding: 10px 24px;">Previous</button>
        <button id="nextBtn" class="btn" style="width: auto; padding: 10px 24px;">Next Question</button>
      </div>
    </section>

    <aside>
      <div class="panel-card">
        <h3>Exam Navigation</h3>
        <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px;">Click numbers to hop straight to any question row.</p>
        
        <div id="navigationBubbleContainer" class="navigation-bubble-grid">
          </div>

        <hr style="border: none; border-top: 1px solid var(--border); margin: 20px 0;">
        
        <button id="submitExamBtn" class="btn" style="background-color: var(--success);">Submit Entire Test</button>
      </div>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
