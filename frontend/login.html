<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Mock Test Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <div class="container nav-container">
      <a href="index.html" class="logo">MockExam Pro</a>
    </div>
  </nav>

  <main class="container auth-wrapper">
    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p>Log into your student account to access active tests.</p>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
        </div>
        
        <button type="submit" class="btn">Secure Login</button>
      </form>
      
      <button onclick="window.location.href='index.html'" class="btn btn-secondary">New here? Register free</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
