<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Profile - RRB EDU</title>
<link rel="stylesheet" href="style.css">

<style>
body{
  background:#f1f5f9;
}

.profile-wrapper{
  max-width:900px;
  margin:40px auto;
}

.profile-card{
  background:white;
  border-radius:20px;
  padding:30px;
  box-shadow:0 20px 50px rgba(15,23,42,.08);
}

.profile-header{
  display:flex;
  align-items:center;
  gap:20px;
  margin-bottom:30px;
}

.avatar{
  width:90px;
  height:90px;
  border-radius:50%;
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
}

.info-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-top:25px;
}

.info-box{
  background:#f8fafc;
  padding:18px;
  border-radius:14px;
}

.info-box h4{
  color:#64748b;
  margin-bottom:8px;
}

.info-box p{
  font-size:18px;
  font-weight:bold;
  color:#0f172a;
}

.actions{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  margin-top:30px;
}

.btn-dark{
  background:#1e293b;
}

.btn-red{
  background:#dc2626;
}
</style>
</head>

<body>

<nav>
  <div class="container nav-container">
    <<a href="dashboard.html" class="logo">RRB EDU</a>
    <button onclick="window.location.href='dashboard.html'" class="btn" style="width:auto;padding:8px 15px;">
      Dashboard
    </button>
  </div>
</nav>

<main class="container profile-wrapper">
  <div class="profile-card">

    <div class="profile-header">
      <div class="avatar">👤</div>
      <div>
        <h1 id="profileName">Student</h1>
        <p id="profileEmail" style="color:#64748b;">student@example.com</p>
      </div>
    </div>

    <div class="info-grid">
      <div class="info-box">
        <h4>Username</h4>
        <p id="usernameBox">-</p>
      </div>

      <div class="info-box">
        <h4>Email</h4>
        <p id="emailBox">-</p>
      </div>

      <div class="info-box">
        <h4>Premium Status</h4>
        <p id="premiumBox">Checking...</p>
      </div>

      <div class="info-box">
        <h4>Premium Expiry</h4>
        <p id="expiryBox">-</p>
      </div>
    </div>

    <div class="actions">
      <button onclick="window.location.href='forgot-password.html'" class="btn btn-dark">
        Change Password
      </button>

      <button onclick="window.location.href='leaderboard.html'" class="btn" style="background:#7c3aed;">
        Leaderboard
      </button>

      <button id="logoutProfileBtn" class="btn btn-red">
        Logout
      </button>
    </div>

  </div>
</main>

<script>
const API_BASE = "https://my-mock-test-platform.onrender.com/api";

document.addEventListener("DOMContentLoaded", async () => {
  const token =
  localStorage.getItem("mock_test_token") ||
  localStorage.getItem("token");
  const userData = localStorage.getItem("mock_test_user");

  if (!token || !userData) {
    window.location.href = "login.html";
    return;
  }

  const user = JSON.parse(userData);

  document.getElementById("profileName").textContent =
    user.username || "Student";

  document.getElementById("profileEmail").textContent =
    user.email || "-";

  document.getElementById("usernameBox").textContent =
    user.username || "-";

  document.getElementById("emailBox").textContent =
    user.email || "-";

  try {
    const response = await fetch(`${API_BASE}/auth/premium-status/${user.id}`);
    const data = await response.json();

    if (response.ok && data.isPremium) {
      document.getElementById("premiumBox").textContent = "Active";
      document.getElementById("premiumBox").style.color = "green";

      document.getElementById("expiryBox").textContent =
        data.premiumExpiresAt
          ? new Date(data.premiumExpiresAt).toLocaleDateString()
          : "-";
    } else {
      document.getElementById("premiumBox").textContent = "Free";
      document.getElementById("premiumBox").style.color = "red";
      document.getElementById("expiryBox").textContent = "Not Active";
    }

  } catch (err) {
    console.error(err);
    document.getElementById("premiumBox").textContent = "Error";
  }

  document.getElementById("logoutProfileBtn").addEventListener("click", () => {
 localStorage.clear();
    window.location.href = "login.html";
  });
});
</script>

</body>
</html>
