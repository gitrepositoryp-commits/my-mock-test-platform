<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Leaderboard Rankings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <div class="container nav-container">
      <a href="dashboard.html" class="logo">MockExam Pro (Standings)</a>
      <button onclick="window.location.href='dashboard.html'" class="btn" style="width:auto; padding: 5px 15px;">Exit Standings</button>
    </div>
  </nav>

  <main class="container" style="max-width: 600px; margin-top: 40px;">
    <div class="card" style="text-align: center; margin-bottom: 25px;">
      <h2 style="font-size: 28px;">🏆 Hall of Fame</h2>
      <p style="color: #64748b; margin-top: 5px;">Real-time competitive metrics tracking the highest scoring platform assessments globally.</p>
    </div>

    <div class="card" style="padding: 10px 0;">
      <table style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead>
          <tr style="border-bottom: 2px solid var(--border-color); color: #475569; font-size: 14px;">
            <th style="padding: 12px 20px;">Rank</th>
            <th style="padding: 12px 10px;">Student</th>
            <th style="padding: 12px 10px; text-align: center;">Score</th>
            <th style="padding: 12px 20px; text-align: right;">Accuracy</th>
          </tr>
        </thead>
        <tbody id="leaderboardRowsContainer">
          <tr>
            <td colspan="4" style="padding: 30px; text-align: center; color: #64748b;">Querying cloud placement data...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const token = localStorage.getItem('mock_test_token');
      const tableBody = document.getElementById('leaderboardRowsContainer');

      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      try {
        const response = await fetch('https://my-mock-test-platform.onrender.com/api/tests/leaderboard', {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          }
        });

        const ranks = await response.json();

        if (response.ok && Array.isArray(ranks)) {
          if (ranks.length === 0) {
            tableBody.innerHTML = `
              <tr>
                <td colspan="4" style="padding: 30px; text-align: center; color: #64748b;">No scoreboard logs registered yet. Be the first to place!</td>
              </tr>`;
            return;
          }

          tableBody.innerHTML = '';
          ranks.forEach((row, index) => {
            const tr = document.createElement('tr');
            tr.style.borderBottom = '1px solid var(--border-color)';
            tr.style.fontSize = '15px';
            
            // Highlight top 3 beautifully
            let rankBadge = index + 1;
            if (index === 0) rankBadge = '🥇';
            if (index === 1) rankBadge = '🥈';
            if (index === 2) rankBadge = '🥉';

            tr.innerHTML = `
              <td style="padding: 15px 20px; font-weight: bold;">${rankBadge}</td>
              <td style="padding: 15px 10px; font-weight: 600;">${row.userId?.username || 'Anonymous Student'}</td>
              <td style="padding: 15px 10px; text-align: center; color: var(--primary); font-weight: bold;">${row.score}</td>
              <td style="padding: 15px 20px; text-align: right; color: var(--success); font-weight: bold;">${row.percentage}%</td>
            `;
            tableBody.appendChild(tr);
          });
        } else {
          tableBody.innerHTML = `<tr><td colspan="4" style="padding:20px; text-align:center; color:var(--error);">Failed to load global rankings securely.</td></tr>`;
        }
      } catch (err) {
        console.error("Leaderboard component crash:", err);
        tableBody.innerHTML = `<tr><td colspan="4" style="padding:20px; text-align:center; color:var(--error);">Failed to load global rankings securely.</td></tr>`;
      }
    });
  </script>
</body>
</html>
