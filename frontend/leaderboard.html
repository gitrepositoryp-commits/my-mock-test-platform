<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Leaderboard Rankings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <div class="container nav-container">
      <a href="dashboard.html" class="logo">MockExam Pro (Standings)</a>
      <button onclick="window.location.href='dashboard.html'" class="btn" style="width:auto; padding: 5px 15px;">Exit Standings</button>
    </div>
  </nav>

 <main class="container" style="max-width:900px; margin-top:40px;">

  <div class="card" style="text-align:center; margin-bottom:25px;">
    <h2 style="font-size:28px;">🏆 Exam Leaderboards</h2>

    <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:20px;">
      <button class="btn" onclick="loadLeaderboard('NTPC')">
        🚆 NTPC
      </button>

      <button class="btn" onclick="loadLeaderboard('GROUP_D')">
        🛤 Group-D
      </button>

      <button class="btn" onclick="loadLeaderboard('GROUP_2')">
        🏛 Group-2
      </button>
    </div>

    <h3 id="leaderboardTitle" style="margin-top:20px;">
      🚆 RRB NTPC Leaderboard
    </h3>
  </div>

  <div class="card">
    <table style="width:100%; border-collapse:collapse; text-align:left;">
      <thead>
        <tr>
          <th style="padding:12px;">Rank</th>
          <th style="padding:12px;">Student</th>
          <th style="padding:12px;">Score</th>
          <th style="padding:12px;">Accuracy</th>
        </tr>
      </thead>

      <tbody id="leaderboardRowsContainer">
        <tr>
          <td colspan="4" style="padding:30px; text-align:center;">
            Loading...
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</main>

<script>

const API =
"https://my-mock-test-platform.onrender.com/api";

async function loadLeaderboard(examType = "NTPC") {

  const token =
    localStorage.getItem("mock_test_token");

  const tableBody =
    document.getElementById(
      "leaderboardRowsContainer"
    );

  const title =
    document.getElementById(
      "leaderboardTitle"
    );

  if (!token) {
    window.location.href =
      "login.html";
    return;
  }

  if (examType === "NTPC")
    title.textContent =
      "🚆 RRB NTPC Leaderboard";

  if (examType === "GROUP_D")
    title.textContent =
      "🛤 RRB Group-D Leaderboard";

  if (examType === "GROUP_2")
    title.textContent =
      "🏛 AP Group-2 Leaderboard";

  tableBody.innerHTML =
    `<tr><td colspan="4" style="padding:20px;text-align:center;">Loading...</td></tr>`;

  try {

    const response =
      await fetch(
        `${API}/tests/leaderboard?exam=${examType}`,
        {
          method: "GET",
          headers: {
            "Authorization":
              `Bearer ${token}`
          }
        }
      );

    const ranks =
      await response.json();

    if (
      response.ok &&
      Array.isArray(ranks)
    ) {

      if (ranks.length === 0) {

        tableBody.innerHTML =
          `<tr>
             <td colspan="4"
             style="padding:20px;text-align:center;">
             No results found.
             </td>
           </tr>`;

        return;
      }

      tableBody.innerHTML = "";

      ranks.forEach((row, index) => {

        let rank = index + 1;

        if (index === 0) rank = "🥇";
        if (index === 1) rank = "🥈";
        if (index === 2) rank = "🥉";

        tableBody.innerHTML += `
          <tr>
            <td style="padding:12px;">
              ${rank}
            </td>

            <td style="padding:12px;">
              ${row.userId?.username ||
                "Student"}
            </td>

            <td style="padding:12px;">
              ${row.score}
            </td>

            <td style="padding:12px;">
              ${row.percentage}%
            </td>
          </tr>
        `;
      });

    } else {

      tableBody.innerHTML =
        `<tr>
           <td colspan="4"
           style="padding:20px;text-align:center;">
           Failed to load leaderboard.
           </td>
         </tr>`;
    }

  } catch (err) {

    console.error(err);

    tableBody.innerHTML =
      `<tr>
         <td colspan="4"
         style="padding:20px;text-align:center;">
         Failed to load leaderboard.
         </td>
       </tr>`;
  }
}

document.addEventListener(
  "DOMContentLoaded",
  () => {
    loadLeaderboard("NTPC");
  }
);

</script>
</body>
</html>
