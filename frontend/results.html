<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Scorecard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <div class="container nav-container">
      <a href="dashboard.html" class="logo">MockExam Pro</a>
    </div>
  </nav>

  <main class="container auth-wrapper">
    <div class="auth-card" style="max-width: 500px; text-align: center;">
      <h2>Exam Completed! 🎉</h2>
      <p>Your assessment evaluation details have been compiled securely.</p>
      
      <div style="margin: 30px 0; padding: 20px; background: #f4f6f9; border-radius: 8px;">
        <h3 style="margin: 0; color: #333;">Your Score</h3>
        <p id="scoreDisplay" style="font-size: 36px; font-weight: bold; color: var(--primary); margin: 10px 0;">0 / 0</p>
        <p id="percentageDisplay" style="font-size: 18px; color: #666; margin: 0;">Percentage: 0%</p>
      </div>

      <div style="display: flex; gap: 15px;">
        <button id="reviewBtn" class="btn" style="background: #333;">Review Answers</button>
        <button onclick="window.location.href='dashboard.html'" class="btn">Back to Dashboard</button>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Pull scores cleanly from the verified submission cache
      const score = localStorage.getItem('last_score') || 0;
      const total = localStorage.getItem('last_total') || 0;
      const percentage = localStorage.getItem('last_percentage') || 0;
      const resultId = localStorage.getItem('last_result_id');

      document.getElementById('scoreDisplay').textContent = `${score} / ${total}`;
      document.getElementById('percentageDisplay').textContent = `Percentage: ${percentage}%`;

      document.getElementById('reviewBtn').addEventListener('click', () => {
        if (resultId) {
          window.location.href = `review.html?id=${resultId}`;
        } else {
          window.location.href = 'review.html';
        }
      });
    });
  </script>
</body>
</html>
