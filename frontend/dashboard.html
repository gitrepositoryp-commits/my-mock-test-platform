<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Control Center - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <div class="container nav-container">
      <a href="dashboard.html" class="logo">MockExam Pro (Dashboard)</a>
      <div style="display: flex; gap: 10px;">
        <a href="leaderboard.html" class="btn" style="width:auto; padding: 8px 15px; background:#1e293b; text-decoration:none;">Leaderboard</a>
        <button id="logoutBtn" class="btn" style="width:auto; padding: 8px 15px; background:var(--error);">Log Out</button>
      </div>
    </div>
  </nav>

  <main class="container" style="margin-top: 40px;">
    <div class="card" style="margin-bottom: 30px;">
      <h2 id="welcomeGreeting">Welcome back, Student! 👋</h2>
      <p style="color: #64748b; margin-top: 5px;">Manage your profile, browse current testing windows, and track performance scores.</p>
    </div>

    <h2>Available Mock Evaluations</h2>
    <div id="availableTestsContainer" style="margin-top: 20px;">
      <div style="padding: 20px; text-align: center; color: #64748b;">
        Querying production test bank allocations... Please wait.
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Security session gate check
      const sessionToken = localStorage.getItem('mock_test_token');
      const cachedUserData = localStorage.getItem('mock_test_user');
      const testContainer = document.getElementById('availableTestsContainer');

      if (!sessionToken) {
        window.location.href = 'login.html';
        return;
      }

      // Render personalized student profile name data cleanly
      if (cachedUserData) {
        try {
          const parsedUser = JSON.parse(cachedUserData);
          document.getElementById('welcomeGreeting').textContent = `Welcome back, ${parsedUser.username || 'Student'}! 👋`;
        } catch (e) {
          console.error("Failed parsing profile metadata state.", e);
        }
      }

      try {
        // Secure communication payload fetch directly containing token parameters
        const response = await fetch('https://my-mock-test-platform.onrender.com/api/tests/questions', {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${sessionToken}`
          }
        });

        const dataBank = await response.json();

        if (response.ok && Array.isArray(dataBank)) {
          if (dataBank.length === 0) {
            testContainer.innerHTML = `
              <div class="card" style="text-align: center; padding: 40px;">
                <h3>No Exams Posted Yet</h3>
                <p style="color:#64748b; margin-top:10px;">The instructor panel has not uploaded test items to this database cluster.</p>
              </div>`;
            return;
          }

          // Generate dynamic test card tracking elements cleanly
          testContainer.innerHTML = `
            <div class="card" style="max-width: 500px; padding: 30px;">
              <span style="background: #e0e7ff; color: var(--primary); padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold;">LIVE EXAM</span>
              <h3 style="margin-top: 15px;">Comprehensive Syllabus Mock Sprint</h3>
              <p style="color: #64748b; font-size: 14px; margin: 10px 0 20px 0;">Contains exactly <strong>${dataBank.length} questions</strong> compiled natively from your cloud database partition.</p>
              <button onclick="window.location.href='test.html'" class="btn">Launch Examination Engine</button>
            </div>
          `;
        } else {
          testContainer.innerHTML = `<div class="card" style="border-left: 5px solid var(--error); color: var(--error);">Failed to retrieve test bank entries securely.</div>`;
        }
      } catch (err) {
        console.error("Dashboard fetch block error connection failure:", err);
        testContainer.innerHTML = `<div class="card" style="border-left: 5px solid var(--error); color: var(--error);">Failed to retrieve test bank entries securely.</div>`;
      }
    });
  </script>
</body>
</html>
