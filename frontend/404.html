<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found | RRB EDU</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f8fafc;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.card{
background:white;
padding:45px;
max-width:600px;
width:100%;
text-align:center;
border-radius:18px;
box-shadow:0 10px 35px rgba(0,0,0,.08);
}

h1{
font-size:90px;
color:#2563eb;
margin-bottom:10px;
}

h2{
color:#0f172a;
margin-bottom:15px;
}

p{
color:#64748b;
line-height:1.7;
margin-bottom:30px;
}

a{
display:inline-block;
padding:14px 28px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
transition:.3s;
}

a:hover{
background:#1d4ed8;
}
</style>

</head>

<body>

<div class="card">

<h1>404</h1>

<h2>Page Not Found</h2>

<p>
Sorry, the page you are looking for does not exist or has been moved.
</p>

<a href="index.html">
🏠 Go to Home
</a>

</div>

</body>
</html>
